<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="FilmVault">
<link rel="manifest" href="manifest.json">
<title>FilmVault · 菲林倉</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=DM+Mono:wght@300;400;500&family=Noto+Sans+HK:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════
   FILMVAULT — Neo-Brutalism × Kodak
   White canvas · bold black borders · hard shadows
═══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --k-yellow:   #FFD100;
  --k-yellow2:  #FFB81C;
  --k-orange:   #F58220;
  --k-orange2:  #D96D10;
  --k-red:      #E31837;
  --k-black:    #000000;
  --bg:         #FFFDF7;
  --bg2:        #FFF8E7;
  --border:     #000000;
  --shadow:     4px 4px 0px 0px #000000;
  --shadow-sm:  3px 3px 0px 0px #000000;
  --shadow-lg:  6px 6px 0px 0px #000000;
  --c-load:     #FFD100;
  --c-unload:   #6699CC;
  --c-dev:      #FF9020;
  --c-arch:     #2DBD7E;
  --mono:    'DM Mono', monospace;
  --display: 'Syne', sans-serif;
  --body:    'Noto Sans HK', sans-serif;
  --safe-b:  env(safe-area-inset-bottom, 0px);
  --r: 14px;
}

html, body { height: 100%; overflow: hidden; background: var(--bg); }
body { font-family: var(--body); color: var(--k-black); -webkit-font-smoothing: antialiased; }
#root { height: 100%; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

.app { display: flex; flex-direction: column; height: 100%; overflow: hidden; }

/* ─── TOPBAR ─── */
.topbar {
  flex-shrink: 0;
  background: var(--k-yellow);
  border-bottom: 3px solid var(--k-black);
  padding: 0 10px; height: 58px;
  display: flex; align-items: center; gap: 6px;
  position: relative; z-index: 10;
}

/* CSS Logo */
.logo-mark {
  width: 32px; height: 32px; flex-shrink: 0;
  background: #fff;
  border-radius: 8px;
  border: 2.5px solid var(--k-black);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  box-shadow: 2px 2px 0px 0px rgba(0,0,0,0.4);
}



.topbar-titles { display: flex; flex-direction: column; justify-content: center; min-width: 0; flex-shrink: 1; }
.topbar-name { font-family: var(--display); font-size: 1.05rem; font-weight: 900; color: var(--k-black); letter-spacing: -0.5px; line-height: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.topbar-sub  { font-family: var(--mono); font-size: 0.42rem; color: rgba(0,0,0,0.5); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* IG link */
.topbar-ig {
  margin-left: auto;
  margin-right: 4px;
  display: flex; align-items: center; gap: 5px;
  text-decoration: none;
  background: var(--k-black);
  color: var(--k-yellow);
  padding: 4px 8px; border-radius: 20px;
  border: 2.5px solid var(--k-black);
  box-shadow: var(--shadow-sm);
  transition: transform 0.08s, box-shadow 0.08s; flex-shrink: 0;
}
.topbar-ig:active { transform: translate(2px,2px); box-shadow: none; }
.topbar-ig-icon { font-size: 0.8rem; }
.topbar-ig-text { font-family: var(--mono); font-size: 0.5rem; color: var(--k-yellow); letter-spacing: 0.5px; font-weight: 700; }

/* Right stat chips */
.topbar-chips { display: flex; gap: 0; }
.topbar-stat { text-align: center; padding: 0 6px; border-left: 2px solid rgba(0,0,0,0.15); }
.topbar-stat-num   { font-family: var(--display); font-size: 1.1rem; font-weight: 900; color: var(--k-black); line-height: 1; display: block; }
.topbar-stat-label { font-family: var(--mono); font-size: 0.4rem; color: rgba(0,0,0,0.5); letter-spacing: 1.5px; text-transform: uppercase; display: block; margin-top: 1px; }

.view-container { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; background: var(--bg); position: relative; z-index: 20; }

/* ─── BOTTOM NAV (5 tabs) ─── */
.bottom-nav {
  flex-shrink: 0; background: var(--k-yellow);
  border-top: 3px solid var(--k-black);
  display: grid; grid-template-columns: repeat(5, 1fr);
  padding-bottom: var(--safe-b);
  position: relative; z-index: 10;
}
.nav-item { background: none; border: none; cursor: pointer; padding: 9px 2px 7px; display: flex; flex-direction: column; align-items: center; gap: 2px; color: rgba(0,0,0,0.4); transition: color 0.15s; -webkit-tap-highlight-color: transparent; position: relative; }
.nav-item.active { color: var(--k-black); }
.nav-item.active::before { content: ''; position: absolute; top: 0; left: 15%; right: 15%; height: 3px; background: var(--bg); border-radius: 0 0 3px 3px; }
.nav-icon  { font-size: 1.05rem; line-height: 1; }
.nav-label { font-family: var(--mono); font-size: 0.42rem; letter-spacing: 1px; text-transform: uppercase; font-weight: 700; }

/* ══════════ SHARED COMPONENTS ══════════ */
.sec-head { display: flex; align-items: center; padding: 12px 16px 9px; border-bottom: 2px solid var(--k-black); gap: 8px; position: sticky; top: 0; background: var(--bg); z-index: 5; }
.sec-title { font-family: var(--mono); font-size: 0.54rem; letter-spacing: 3px; text-transform: uppercase; color: #555; flex: 1; font-weight: 700; }
.sec-count { font-family: var(--display); font-size: 1.1rem; font-weight: 900; color: var(--k-black); background: var(--k-yellow); border: 2px solid var(--k-black); border-radius: 8px; padding: 1px 10px; box-shadow: var(--shadow-sm); }

/* Neo-Brutalism Card */
.card {
  background: #fff;
  border: 2.5px solid var(--k-black);
  border-radius: var(--r);
  padding: 14px 15px;
  margin: 0 12px 10px;
  box-shadow: var(--shadow);
  transition: transform 0.08s, box-shadow 0.08s;
  position: relative;
}
.card-title { font-family: var(--body); font-size: 0.95rem; font-weight: 900; color: var(--k-black); margin-bottom: 3px; }
.card-sub   { font-family: var(--mono); font-size: 0.6rem; color: #666; }

/* ─── FILM BUDDY EMOJI ─── */
.film-buddy { font-size: 1.5rem; line-height: 1; flex-shrink: 0; }

/* ─── CTA BUTTONS (Neo-Brutalism press effect) ─── */
.btn-cta {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  background: var(--k-yellow);
  border: 2.5px solid var(--k-black);
  color: var(--k-black);
  font-family: var(--display); font-size: 0.85rem; font-weight: 900;
  padding: 9px 16px;
  border-radius: 10px;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: transform 0.08s, box-shadow 0.08s;
  -webkit-tap-highlight-color: transparent; white-space: nowrap;
}
.btn-cta:active { transform: translate(3px,3px); box-shadow: none; }

.fab {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: calc(100% - 24px); margin: 10px 12px;
  background: var(--k-yellow);
  color: var(--k-black);
  border: 2.5px solid var(--k-black);
  cursor: pointer;
  padding: 15px 20px;
  font-family: var(--display); font-size: 1rem; font-weight: 900;
  border-radius: var(--r);
  box-shadow: var(--shadow);
  transition: transform 0.08s, box-shadow 0.08s;
  -webkit-tap-highlight-color: transparent;
}
.fab:active   { transform: translate(4px,4px); box-shadow: none; }
.fab:disabled { background: #e8e8e8; color: #aaa; border-color: #aaa; box-shadow: none; cursor: not-allowed; }

.btn-ghost {
  display: inline-flex; align-items: center; justify-content: center; gap: 5px;
  background: #fff;
  border: 2px solid var(--k-black);
  color: var(--k-black);
  font-family: var(--mono); font-size: 0.57rem; letter-spacing: 1px; text-transform: uppercase;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: transform 0.08s, box-shadow 0.08s;
  -webkit-tap-highlight-color: transparent; white-space: nowrap;
}
.btn-ghost:active { transform: translate(3px,3px); box-shadow: none; }

.btn-danger {
  display: inline-flex; align-items: center; justify-content: center;
  background: #fff;
  border: 2px solid var(--k-red);
  color: var(--k-red);
  font-family: var(--mono); font-size: 0.57rem; letter-spacing: 1px; text-transform: uppercase;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  box-shadow: 3px 3px 0px 0px var(--k-red);
  transition: transform 0.08s, box-shadow 0.08s;
  -webkit-tap-highlight-color: transparent; white-space: nowrap;
}
.btn-danger:active { transform: translate(3px,3px); box-shadow: none; }

/* ─── PILLS ─── */
.pill {
  display: inline-block; font-family: var(--mono); font-size: 0.46rem;
  letter-spacing: 1.5px; text-transform: uppercase;
  padding: 3px 8px; border-radius: 6px;
  border: 2px solid var(--k-black);
  font-weight: 700; background: #fff;
}
.pill.loaded     { background: var(--k-yellow);  border-color: var(--k-black); color: var(--k-black); }
.pill.unloaded   { background: #D4E8FF;           border-color: var(--k-black); color: var(--k-black); }
.pill.developing { background: #FFE0B2;           border-color: var(--k-black); color: var(--k-black); }
.pill.archived   { background: #C8F7E0;           border-color: var(--k-black); color: var(--k-black); }
.pill.expired    { background: var(--k-red);      border-color: var(--k-black); color: #fff; }
.pill.low-stock  { background: #FFD0A0;           border-color: var(--k-black); color: var(--k-black); }
.pill.posted     { background: #E8E8E8;           border-color: var(--k-black); color: #555; }

/* ─── FORM ─── */
.form-group { margin-bottom: 15px; }
.form-label { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 0.54rem; letter-spacing: 2px; text-transform: uppercase; color: #444; margin-bottom: 7px; font-weight: 700; }
.form-opt   { font-family: var(--mono); font-size: 0.42rem; color: #888; letter-spacing: 1px; padding: 1px 5px; border: 1.5px solid #bbb; border-radius: 4px; }
.form-input, .form-select, .form-textarea {
  width: 100%;
  background: #fff;
  border: 2px solid var(--k-black);
  color: var(--k-black);
  font-family: var(--mono); font-size: 0.88rem;
  padding: 11px 13px;
  border-radius: 10px;
  outline: none; appearance: none; -webkit-appearance: none;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.12s, transform 0.08s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  box-shadow: 4px 4px 0px 0px var(--k-yellow);
  outline: none;
}
.form-input::placeholder, .form-textarea::placeholder { color: #bbb; }
.form-textarea { min-height: 70px; resize: none; line-height: 1.5; font-family: var(--body); font-size: 0.85rem; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-section-label {
  font-family: var(--mono); font-size: 0.49rem; letter-spacing: 3px; text-transform: uppercase;
  color: #888; margin: 4px 0 13px;
  display: flex; align-items: center; gap: 8px;
  font-weight: 700;
}
.form-section-label::before, .form-section-label::after { content: ''; flex: 1; height: 2px; background: #e0e0e0; border-radius: 1px; }

/* Price input */
.price-wrap { position: relative; }
.price-prefix { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-family: var(--mono); font-size: 0.88rem; color: var(--k-black); font-weight: 700; pointer-events: none; z-index: 1; }
.price-input { padding-left: 26px !important; }

/* ─── MODAL ─── */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
.modal {
  background: var(--bg);
  width: 100%; max-width: 520px;
  border-radius: 20px 20px 0 0;
  border-top: 3px solid var(--k-black);
  border-left: 3px solid var(--k-black);
  border-right: 3px solid var(--k-black);
  max-height: 92dvh;
  display: flex; flex-direction: column;
  animation: slideUp 0.26s cubic-bezier(0.32,0.72,0,1);
  overflow: hidden;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-drag   { width: 40px; height: 4px; background: #ccc; border-radius: 2px; margin: 10px auto 0; flex-shrink: 0; border: 1.5px solid #bbb; }
.modal-header { padding: 12px 18px 10px; border-bottom: 2px solid var(--k-black); flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; background: var(--k-yellow); }
.modal-title  { font-family: var(--display); font-size: 1.1rem; font-weight: 900; color: var(--k-black); letter-spacing: -0.5px; }
.modal-close  { background: var(--k-black); border: 2.5px solid var(--k-black); color: #fff; font-size: 0.78rem; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 8px; box-shadow: var(--shadow-sm); transition: transform 0.08s, box-shadow 0.08s; margin-left: 8px; flex-shrink: 0; }
.modal-close:active { transform: translate(2px,2px); box-shadow: none; }
.modal-body   { padding: 18px 18px 0; overflow-y: auto; flex: 1; }

/* Sticky modal footer */
.modal-footer {
  flex-shrink: 0; position: sticky; bottom: 0;
  background: var(--bg);
  border-top: 2px solid var(--k-black);
  padding: 12px 18px;
  padding-bottom: calc(24px + var(--safe-b));
  display: grid; grid-template-columns: 1fr 2fr; gap: 10px;
  z-index: 10;
}
.modal-footer.single { grid-template-columns: 1fr; }
.btn-modal-cancel {
  background: #fff; border: 2px solid var(--k-black); color: var(--k-black);
  font-family: var(--mono); font-size: 0.63rem; letter-spacing: 1.5px; text-transform: uppercase;
  padding: 14px; cursor: pointer; border-radius: 10px;
  box-shadow: var(--shadow-sm);
  transition: transform 0.08s, box-shadow 0.08s;
}
.btn-modal-cancel:active { transform: translate(3px,3px); box-shadow: none; }
.btn-modal-ok {
  background: var(--k-yellow); border: 2.5px solid var(--k-black); color: var(--k-black);
  font-family: var(--display); font-size: 1rem; font-weight: 900;
  padding: 14px; cursor: pointer; border-radius: 10px;
  box-shadow: var(--shadow);
  transition: transform 0.08s, box-shadow 0.08s;
}
.btn-modal-ok:active { transform: translate(4px,4px); box-shadow: none; }

/* ─── FOLDER NAME ─── */
.folder-box { background: #fff; border: 2px solid var(--k-black); color: var(--k-black); font-family: var(--mono); font-size: 0.73rem; padding: 11px 13px; border-radius: 10px; display: flex; align-items: center; gap: 8px; margin-bottom: 10px; word-break: break-all; box-shadow: var(--shadow-sm); }
.folder-text { flex: 1; line-height: 1.5; }
.folder-copy-btn { background: var(--k-yellow); border: 2px solid var(--k-black); color: var(--k-black); font-family: var(--mono); font-size: 0.53rem; padding: 5px 8px; cursor: pointer; border-radius: 6px; letter-spacing: 1px; flex-shrink: 0; white-space: nowrap; font-weight: 700; box-shadow: 2px 2px 0 #000; transition: transform 0.08s, box-shadow 0.08s; }
.folder-copy-btn:active { transform: translate(2px,2px); box-shadow: none; }

/* ─── TOGGLE ─── */
.toggle-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
.toggle { position: relative; width: 42px; height: 24px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-track { position: absolute; inset: 0; background: #ddd; border-radius: 12px; cursor: pointer; transition: background 0.2s; border: 2px solid var(--k-black); }
.toggle input:checked + .toggle-track { background: var(--k-yellow); }
.toggle-track::after { content: ''; position: absolute; left: 3px; top: 2px; width: 14px; height: 14px; background: var(--bg); border-radius: 50%; transition: transform 0.2s; }
.toggle input:checked + .toggle-track::after { transform: translateX(18px); background: var(--bg); }
.toggle-label { font-family: var(--mono); font-size: 0.6rem; color: #555; letter-spacing: 1px; flex: 1; font-weight: 700; }

/* ─── META / NOTES ─── */
.meta-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.meta-tag  { font-family: var(--mono); font-size: 0.53rem; color: #555; background: #f0f0f0; border: 1.5px solid #bbb; padding: 2px 7px; border-radius: 6px; }
.notes-display { font-family: var(--mono); font-size: 0.63rem; color: #666; margin-top: 5px; font-style: italic; border-left: 3px solid var(--k-yellow); padding-left: 8px; }

/* ─── MISC ─── */
.empty { text-align: center; padding: 40px 20px; font-family: var(--mono); font-size: 0.58rem; color: #aaa; letter-spacing: 2px; text-transform: uppercase; line-height: 2.4; }
.empty-icon { font-size: 2.8rem; display: block; margin-bottom: 12px; opacity: 0.35; }
.divider { height: 6px; background: var(--k-yellow); border-top: 2px solid var(--k-black); border-bottom: 2px solid var(--k-black); margin: 4px 0 0; }

/* ─── STOCK QUANTITIES ─── */
.stock-qty      { font-family: var(--display); font-size: 2rem; font-weight: 900; color: var(--k-black); line-height: 1; }
.stock-qty.low  { color: var(--k-red); }
.stock-qty.zero { color: #ccc; }
.qty-row { display: flex; align-items: center; gap: 5px; }
.qty-btn { width: 28px; height: 24px; background: #fff; border: 2px solid var(--k-black); color: var(--k-black); font-size: 1rem; font-weight: 900; cursor: pointer; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: transform 0.08s, box-shadow 0.08s; -webkit-tap-highlight-color: transparent; box-shadow: 2px 2px 0 #000; }
.qty-btn:active { transform: translate(2px,2px); box-shadow: none; }

.card-actions { display: flex; align-items: center; justify-content: flex-end; gap: 8px; margin-top: 11px; padding-top: 9px; border-top: 1.5px solid #eee; }
.cam-manage-row { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1.5px solid #eee; }
.cam-manage-name { flex: 1; font-family: var(--body); font-size: 0.85rem; color: var(--k-black); font-weight: 700; }
.cam-manage-sub  { font-family: var(--mono); font-size: 0.53rem; color: #888; }

/* ══════════════════════════════════════
   LOG TAB
══════════════════════════════════════ */
.log-wrap { padding-bottom: 24px; background: var(--bg); }

/* 3-column dashboard */
.dashboard-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 2px; background: var(--bg); border-bottom: 3px solid var(--k-black); }
.dash-card { background: var(--bg2); padding: 14px 10px 12px; }
.dash-card-label { font-family: var(--mono); font-size: 0.44rem; letter-spacing: 2px; text-transform: uppercase; color: #666; margin-bottom: 4px; font-weight: 700; }
.dash-card-value { font-family: var(--display); font-size: 1.5rem; font-weight: 900; color: var(--k-black); line-height: 1; }
.dash-card-sub   { font-family: var(--mono); font-size: 0.46rem; color: #888; margin-top: 3px; }

/* Top 5 */
.top5-block  { background: #fff; border-bottom: 2px solid var(--k-black); padding: 12px 16px 13px; }
.top5-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; }
.top5-title  { font-family: var(--mono); font-size: 0.5rem; letter-spacing: 3px; text-transform: uppercase; color: #666; flex: 1; font-weight: 700; }
.top5-title-month { font-family: var(--display); font-size: 0.75rem; font-weight: 900; color: var(--k-black); background: var(--k-yellow); border: 2px solid var(--k-black); border-radius: 6px; padding: 1px 8px; }
.top5-list { display: flex; flex-direction: column; gap: 7px; }
.top5-row  { display: flex; align-items: center; gap: 8px; }
.top5-rank { font-family: var(--display); font-size: 0.68rem; font-weight: 900; color: #bbb; width: 16px; text-align: right; flex-shrink: 0; }
.top5-rank.gold{color:#DAA520;} .top5-rank.silver{color:#888;} .top5-rank.bronze{color:#CD7F32;}
.top5-bar-wrap { width: 75px; flex-shrink: 0; background: #eee; height: 7px; border-radius: 4px; overflow: hidden; border: 1px solid #ddd; }
.top5-bar{height:100%;background:var(--k-yellow);border-radius:3px;transition:width 0.4s ease;}
.top5-bar.silver{background:#aaa;} .top5-bar.bronze{background:#CD7F32;} .top5-bar.rest{background:#ccc;}
.top5-film-name { font-family: var(--mono); font-size: 0.6rem; color: #444; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; font-weight: 700; }
.top5-count { font-family: var(--display); font-size: 0.75rem; font-weight: 900; color: var(--k-black); min-width: 18px; text-align: right; flex-shrink: 0; }

// ═══════════════════════════════════════════════════
// STORAGE — DB v8: per-transaction price on stock log entries
// ═══════════════════════════════════════════════════
const DB_KEY  = 'ff_v8';

const defaultState = {
  films:    [],   // { id, brand, name, expiry } — master film catalogue
  stock:    {},   // { [filmId]: qty }
  cameras:  [],   // { id, name }
  rolls:    [],   // ActiveRoll
  log:      [],   // LogEvent (price/devPrice stored here per transaction)
};

function migrateRoll(r) { return { theme:'',location:'',friends:'',notes:'',price:0,devPrice:0,...r }; }
function migrateFilm(f) {
  const { format,frames,iso,...rest }=f;
  // If no brand, try to infer from name
  if(!rest.brand) {
    const match=BRANDS.find(b=>rest.name?.toLowerCase().startsWith(b.toLowerCase()));
    rest.brand=match||'其他';
  }
  return rest;
}

function loadDB() {
  try {
    const raw=localStorage.getItem(DB_KEY);
    if(raw){ const d=JSON.parse(raw); return {...defaultState,...d,rolls:(d.rolls||[]).map(migrateRoll),films:(d.films||[]).map(migrateFilm)}; }
    for(const k of ['ff_v7','ff_v6','ff_v5']){
      const old=localStorage.getItem(k);
      if(old){ const d=JSON.parse(old); return {...defaultState,...d,rolls:(d.rolls||[]).map(migrateRoll),films:(d.films||[]).map(migrateFilm)}; }
    }
  }catch(e){}
  return {...defaultState};
}
function saveDB(s){ try{localStorage.setItem(DB_KEY,JSON.stringify(s));}catch(e){} }

function uid()   { return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function today() { return new Date().toISOString().slice(0,10); }
function nowISO(){ return new Date().toISOString(); }

function formatDate(iso){ if(!iso)return''; return new Date(iso.slice(0,10)+'T12:00:00').toLocaleDateString('zh-HK',{year:'numeric',month:'short',day:'numeric'}); }
function formatTS(iso)  { return new Date(iso).toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit'}); }
function isExpired(e)   { if(!e)return false; const ed=new Date(e+(e.length===7?'-01':'')); const n=new Date(); return ed<new Date(n.getFullYear(),n.getMonth(),1); }
function sanitize(s)    { if(!s)return''; return s.trim().replace(/\s+/g,'').replace(/[^a-zA-Z0-9\u4e00-\u9fff\u3040-\u309f\u30a0-\u30ff]/g,'').slice(0,24); }
function genFolderName(r){ const d=(r.loadedAt||r.archivedAt||nowISO()).slice(0,7).replace('-',''); return[d,sanitize(r.cameraName),sanitize(r.filmName),sanitize(r.theme),sanitize(r.location),sanitize(r.friends)].filter(Boolean).join('_'); }
function fmtPrice(n)    { if(!n&&n!==0)return'—'; return'$'+Number(n).toLocaleString('en',{minimumFractionDigits:0,maximumFractionDigits:2}); }

// ── TOAST ──
let _tt;
function useToast(){
  const [msg,setMsg]=useState(''); const [vis,setVis]=useState(false);
  const show=useCallback(m=>{setMsg(m);setVis(true);clearTimeout(_tt);_tt=setTimeout(()=>setVis(false),2600);},[]);
  return {msg,vis,show};
}

function Modal({title,onClose,children,footer,single}){
  useEffect(()=>{ const h=e=>{if(e.key==='Escape')onClose();}; window.addEventListener('keydown',h); return()=>window.removeEventListener('keydown',h); },[onClose]);
  return (
    <div className="modal-bg" onClick={e=>{if(e.target.className==='modal-bg')onClose();}}>
      <div className="modal">
        <div className="modal-drag"/>
        <div className="modal-header"><div className="modal-title">{title}</div><button className="modal-close" onClick={onClose}>✕</button></div>
        <div className="modal-body">{children}</div>
        {footer&&<div className={`modal-footer ${single?'single':''}`}>{footer}</div>}
      </div>
    </div>
  );
}

// ① STOCK TAB — Quick-select helpers + free-text final inputs
// ═══════════════════════════════════════════════════
function StockTab({state,dispatch,toast,t}){
  // filmFullName = single confirmed text field, the only value submitted to DB
  // quickBrand / quickFilm = helper dropdowns for auto-fill only
  const EMPTY={quickBrand:'',quickFilm:'',filmFullName:'',qty:'1',expiry:'',price:''};
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState(EMPTY);
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));

  // Quick-select brand: reset film, clear the full-name field to just the brand
  const handleQuickBrand=e=>{
    const v=e.target.value;
    setForm(f=>({...f,quickBrand:v,quickFilm:'',filmFullName:v?v:''}));
  };
  // Quick-select film: combine brand + film into single string
  const handleQuickFilm=e=>{
    const v=e.target.value;
    setForm(f=>({...f,quickFilm:v,filmFullName:v?`${f.quickBrand} ${v}`.trim():''}));
  };

  // Film options cascade from quick-select brand
  const filmNames=form.quickBrand?FILM_CATALOGUE[form.quickBrand]||[]:[];

  const filmList=useMemo(()=>
    state.films.map(f=>({...f,qty:state.stock[f.id]||0,expired:isExpired(f.expiry)})).sort((a,b)=>a.name.localeCompare(b.name)),
    [state.films,state.stock]);
  const totalRolls=useMemo(()=>Object.values(state.stock).reduce((s,v)=>s+v,0),[state.stock]);

  function handleSubmit(){
    const fullName=form.filmFullName.trim();
    if(!fullName){toast(t('err_film_name'));return;}
    const priceVal=parseFloat(form.price);
    if(!form.price||isNaN(priceVal)||priceVal<0){toast(t('err_price'));return;}
    const qty=parseInt(form.qty)||1;
    // Store full name in both brand and name fields for display consistency
    const existing=state.films.find(f=>f.name===fullName);
    if(existing){
      dispatch({type:'ADD_STOCK',filmId:existing.id,qty,notes:fullName,price:priceVal});
    }else{
      dispatch({type:'ADD_FILM_AND_STOCK',film:{id:uid(),brand:'',name:fullName,expiry:form.expiry,barcodes:[]},qty,price:priceVal});
    }
    toast(`✓ ${qty}× ${fullName} · ${fmtPrice(priceVal)}`);
    setShowAdd(false);setForm(EMPTY);
  }

  return (
    <div style={{paddingBottom:8}}>
      {/* Stats bar */}
      <div style={{display:'flex',gap:0,background:'var(--k-black)',borderBottom:'3px solid var(--k-black)'}}>
        {[{n:totalRolls,l:t('stock_total_rolls'),w:false},{n:filmList.filter(f=>f.qty>0&&!f.expired).length,l:t('stock_film_types'),w:false},{n:filmList.filter(f=>f.expired&&f.qty>0).length,l:t('stock_expired_count'),w:true}].map((s,i)=>(
          <div key={s.l} style={{flex:1,background:'var(--bg2)',padding:'14px 10px 12px',textAlign:'center',borderLeft:i>0?'3px solid var(--k-black)':'none'}}>
            <div style={{fontFamily:'var(--display)',fontSize:'1.8rem',fontWeight:900,lineHeight:1,color:s.w&&s.n>0?'var(--k-red)':'var(--k-black)'}}>{s.n}</div>
            <div style={{fontFamily:'var(--mono)',fontSize:'0.46rem',color:'#777',letterSpacing:2,textTransform:'uppercase',marginTop:4,fontWeight:700}}>{s.l}</div>
          </div>
        ))}
      </div>

      <button className="fab" onClick={()=>{setForm(EMPTY);setShowAdd(true);}}>
        {t('btn_add_stock')}
      </button>

      <div className="sec-head">
        <span className="sec-title">{t('title_stock_list')}</span>
        <span className="sec-count">{filmList.filter(f=>f.qty>0).length}</span>
      </div>
      {filmList.length===0&&<div className="empty"><span className="empty-icon">📦</span>{t('empty_stock')}<br/>{t('empty_stock_sub')}</div>}
      {filmList.map(film=>{
        const low=film.qty===1, zero=film.qty===0;
        const accent=film.expired?'var(--k-red)':low?'var(--k-orange)':zero?'#ddd':'var(--k-yellow)';
        return (
          <div key={film.id} className="card" style={{borderLeft:`3px solid ${accent}`}}>
            <div style={{display:'flex',alignItems:'flex-start',gap:12}}>
              <div style={{flex:1,minWidth:0}}>
                <div className="card-title" style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                  <span style={{flex:1,minWidth:0}}>
                    {film.brand&&<span style={{fontFamily:'var(--mono)',fontSize:'0.52rem',color:'#888',marginRight:5,fontWeight:700}}>{film.brand}</span>}
                    {film.name||film.filmName||'—'}
                  </span>
                  {film.expired&&<span className="pill expired">{t('pill_expired')}</span>}
                  {low&&!film.expired&&<span className="pill low-stock">{t('pill_low_stock')}</span>}
                </div>
                <div className="card-sub" style={{marginTop:4}}>{film.expiry?`有效期至 ${film.expiry}`:''}</div>
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
                <div className={`stock-qty ${low&&!film.expired?'low':zero?'zero':''}`} style={{color:film.expired?'var(--k-red)':undefined}}>{film.qty}</div>
                <div className="qty-row">
                  <button className="qty-btn" onClick={()=>dispatch({type:'ADJUST_STOCK',filmId:film.id,delta:1})}>+</button>
                  <button className="qty-btn" onClick={()=>dispatch({type:'ADJUST_STOCK',filmId:film.id,delta:-1})}>−</button>
                </div>
              </div>
            </div>
          </div>
        );
      })}

      {/* ADD STOCK MODAL */}
      {showAdd&&(
        <Modal title={t('modal_add_stock')} onClose={()=>setShowAdd(false)}
          footer={<><button className="btn-modal-cancel" onClick={()=>setShowAdd(false)}>{t('btn_cancel')}</button><button className="btn-modal-ok" onClick={handleSubmit}>{t('btn_confirm_stock')}</button></>}>
          {/* ── Quick-select helpers side-by-side (auto-fill only) ── */}
          <div className="form-section-label">{t('quick_select')}</div>
          <div className="form-row" style={{marginBottom:0}}>
            <div className="form-group">
              <label className="form-label" style={{fontSize:'0.48rem'}}>{t('form_brand')}</label>
              <select className="form-select" value={form.quickBrand} onChange={handleQuickBrand}>
                <option value="">{t('opt_brand')}</option>
                {BRANDS.map(b=><option key={b} value={b}>{b}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label" style={{fontSize:'0.48rem'}}>{t('form_film')}</label>
              <select className="form-select" value={form.quickFilm} onChange={handleQuickFilm}
                disabled={!form.quickBrand}>
                <option value="">{form.quickBrand?t('opt_film'):t('opt_film_first')}</option>
                {filmNames.map(n=><option key={n} value={n}>{n}</option>)}
              </select>
            </div>
          </div>
          {/* ── Single confirmed name field (only value submitted to DB) ── */}
          <div className="form-group" style={{marginBottom:16}}>
            <label className="form-label">{t('form_confirm_name')}</label>
            <input className="form-input" value={form.filmFullName}
              onChange={e=>F('filmFullName',e.target.value)}
              placeholder={t('ph_film_name')} autoComplete="off"/>
          </div>
          {/* Qty + Price */}
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">{t('form_qty')}</label>
              <input className="form-input" type="number" value={form.qty} onChange={e=>F('qty',e.target.value)} min="1" max="99"/>
            </div>
            <div className="form-group">
              <label className="form-label">{t('form_price')}</label>
              <div className="price-wrap">
                <span className="price-prefix">$</span>
                <input className="form-input price-input" type="number" value={form.price} onChange={e=>F('price',e.target.value)} placeholder="0.00" min="0" step="0.01"/>
              </div>
            </div>
          </div>
          <div className="form-section-label">{t('section_optional')}</div>
          <div className="form-group">
            <label className="form-label">{t('form_expiry')} <span className="form-opt">{t('label_optional')}</span></label>
            <input className="form-input" type="month" value={form.expiry} onChange={e=>F('expiry',e.target.value)}/>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════
// ② SHOOT TAB
// ═══════════════════════════════════════════════════
function ShootTab({state,dispatch,toast,t}){
  const [modal,setModal]=useState(null);
  const [sel,setSel]=useState(null);
  const [form,setForm]=useState({});
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));

  const loaded  =useMemo(()=>state.rolls.filter(r=>r.status==='loaded'),[state.rolls]);
  const unloaded=useMemo(()=>state.rolls.filter(r=>r.status==='unloaded'),[state.rolls]);
  const avail   =useMemo(()=>state.films.filter(f=>(state.stock[f.id]||0)>0),[state.films,state.stock]);
  const freeCams=state.cameras.filter(c=>!state.rolls.find(r=>r.cameraId===c.id&&r.status==='loaded'));

  function submitLoad(){
    if(!form.filmId){toast(t('err_select_film'));return;}
    const camName=(form.cameraNew||'').trim()||state.cameras.find(c=>c.id===form.cameraId)?.name;
    if(!camName){toast(t('err_select_cam'));return;}
    const film=state.films.find(f=>f.id===form.filmId);
    let cam=state.cameras.find(c=>c.name.toLowerCase()===camName.toLowerCase());
    if(!cam){cam={id:uid(),name:camName};dispatch({type:'ADD_CAMERA',camera:cam});}
    const roll={id:uid(),filmId:film.id,filmName:`${film.brand} ${film.name}`,cameraId:cam.id,cameraName:cam.name,
      status:'loaded',loadedAt:nowISO(),notes:'',
      theme:(form.theme||'').trim(),location:(form.location||'').trim(),friends:(form.friends||'').trim(),
      price:0,devPrice:0,lab:'',downloadUrl:'',folderName:'',posted:false};
    dispatch({type:'LOAD_FILM',roll,filmId:film.id});
    toast(`✓ ${film.brand} ${film.name} → ${cam.name}`);setModal(null);
  }

  function submitNote(){
    dispatch({type:'UPDATE_ROLL',id:sel.id,updates:{notes:form.notes}});
    dispatch({type:'LOG',entry:{id:uid(),type:'note',date:today(),timestamp:nowISO(),title:`更新拍攝手記`,detail:`${sel.filmName} — ${form.notes}`}});
    toast(t('msg_note_saved'));setModal(null);
  }

  function unloadRoll(roll){
    dispatch({type:'UPDATE_ROLL',id:roll.id,updates:{status:'unloaded',unloadedAt:nowISO()}});
    dispatch({type:'LOG',entry:{id:uid(),type:'unload',date:today(),timestamp:nowISO(),title:`出片：${roll.filmName}`,detail:`from ${roll.cameraName}`}});
    toast(`✓ ${roll.filmName} — ${t('pill_unloaded')}`);
  }

  function submitLab(){
    if(!(form.lab||'').trim()){toast(t('err_lab_name'));return;}
    const devP=parseFloat(form.devPrice);
    if(!form.devPrice||isNaN(devP)||devP<0){toast(t('err_dev_price'));return;}
    dispatch({type:'UPDATE_ROLL',id:sel.id,updates:{status:'developing',lab:form.lab.trim(),sentAt:nowISO(),devPrice:devP}});
    dispatch({type:'LOG',entry:{id:uid(),type:'lab',date:today(),timestamp:nowISO(),title:`送沖：${sel.filmName}`,detail:`沖曬店：${form.lab.trim()} · ${fmtPrice(devP)}`,devPrice:devP}});
    toast(`✓ ${form.lab.trim()} · ${fmtPrice(devP)}`);setModal(null);
  }

  function deleteCamera(camId){
    const cam=state.cameras.find(c=>c.id===camId);
    if(state.rolls.some(r=>r.cameraId===camId&&r.status==='loaded')){toast(t('err_cam_loaded'));return;}
    dispatch({type:'DELETE_CAMERA',camId});toast(`✓ ${cam?.name}`);
  }

  function MetaTags({roll}){
    const tags=[roll.theme&&`🎭 ${roll.theme}`,roll.location&&`📍 ${roll.location}`,roll.friends&&`👥 ${roll.friends}`].filter(Boolean);
    return <div>{roll.notes&&<div className="notes-display">「{roll.notes}」</div>}{tags.length>0&&<div className="meta-tags">{tags.map((t,i)=><span key={i} className="meta-tag">{t}</span>)}</div>}</div>;
  }

  return (
    <div style={{paddingBottom:8}}>
      <div style={{display:'flex',gap:8,padding:'8px 12px 0'}}>
        <button className="fab" style={{margin:0,flex:1}} onClick={()=>{setForm({filmId:avail[0]?.id||'',cameraId:'',cameraNew:'',theme:'',location:'',friends:''});setModal('load');}} disabled={avail.length===0}>
          {avail.length===0?t('btn_load_empty'):t('btn_load_film')}
        </button>
        <button onClick={()=>setModal('cameras')} style={{background:'#f5f5f5',border:'1px solid var(--g4)',color:'#555',padding:'0 13px',borderRadius:'var(--r)',cursor:'pointer',fontFamily:'var(--mono)',fontSize:'0.58rem',letterSpacing:'1px',flexShrink:0}}>{t('btn_manage_cam')}</button>
      </div>

      <div className="sec-head" style={{marginTop:8}}><span className="sec-title">{t('title_loaded')}</span><span className="sec-count">{loaded.length}</span></div>
      {loaded.length===0&&<div className="empty"><span className="empty-icon">📷</span>{t('empty_loaded')}</div>}
      {loaded.map(roll=>(
        <div key={roll.id} className="card" style={{borderLeft:'3px solid #000',background:'#FFFDE0'}}>
          <div style={{marginBottom:0}}>
            <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:3}}>
              <div className="card-title">{roll.cameraName}</div>
              <span className="pill loaded">{t('pill_loaded')}</span>
            </div>
            <div className="card-sub">{roll.filmName} · {formatDate(roll.loadedAt)}</div>
            <MetaTags roll={roll}/>
          </div>
          <div className="card-actions">
            <button className="btn-ghost" onClick={()=>{setSel(roll);setForm({notes:roll.notes||''});setModal('note');}}>{t('btn_notes')}</button>
            <button className="btn-cta" onClick={()=>unloadRoll(roll)}>{t('btn_unload')}</button>
          </div>
        </div>
      ))}

      <div className="divider"/>
      <div className="sec-head"><span className="sec-title">{t('title_unloaded')}</span><span className="sec-count">{unloaded.length}</span></div>
      {unloaded.length===0&&<div className="empty" style={{padding:'24px 20px'}}><span style={{fontSize:'1.6rem',display:'block',marginBottom:8}}>⏳</span>{t('empty_unloaded')}</div>}
      {unloaded.map(roll=>(
        <div key={roll.id} className="card" style={{borderLeft:'3px solid #bbb'}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
              <div className="card-title">{roll.filmName}</div>
              <span className="pill unloaded">{t('pill_unloaded')}</span>
            </div>
            <div className="card-sub">{roll.cameraName} · {formatDate(roll.unloadedAt)}</div>
            <MetaTags roll={roll}/>
          </div>
          <div className="card-actions">
            <button className="btn-cta" onClick={()=>{setSel(roll);setForm({lab:'',devPrice:''});setModal('lab');}}>{t('btn_send_lab')}</button>
          </div>
        </div>
      ))}

      {/* MODAL: Load */}
      {modal==='load'&&(
        <Modal title={t('modal_load_film')} onClose={()=>setModal(null)}
          footer={<><button className="btn-modal-cancel" onClick={()=>setModal(null)}>{t('btn_cancel')}</button><button className="btn-modal-ok" onClick={submitLoad}>{t('btn_confirm_load')}</button></>}>
          <div className="form-group">
            <label className="form-label">{t('form_select_film')}</label>
            <select className="form-select" value={form.filmId} onChange={e=>F('filmId',e.target.value)}>
              {avail.map(f=><option key={f.id} value={f.id}>{f.brand} {f.name} ({state.stock[f.id]||0} 卷){isExpired(f.expiry)?` ${t('tag_expired')}`:''}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">{t('form_select_cam')}</label>
            <select className="form-select" value={form.cameraId} onChange={e=>{F('cameraId',e.target.value);F('cameraNew','');}}>
              <option value="">{t('opt_cam')}</option>
              {freeCams.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">{t('form_new_cam')} <span className="form-opt">{t('label_optional')}</span></label>
            <input className="form-input" value={form.cameraNew||''} onChange={e=>{F('cameraNew',e.target.value);F('cameraId','');}} placeholder={t('ph_cam')} autoComplete="off"/>
          </div>
          <div className="form-section-label">{t('section_tags')}</div>
          <div className="form-group">
            <label className="form-label">{t('form_theme')} <span className="form-opt">{t('label_optional')}</span></label>
            <input className="form-input" value={form.theme||''} onChange={e=>F('theme',e.target.value)} placeholder={t('ph_theme')} autoComplete="off"/>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">{t('form_location')} <span className="form-opt">{t('label_optional')}</span></label>
              <input className="form-input" value={form.location||''} onChange={e=>F('location',e.target.value)} placeholder={t('ph_location')} autoComplete="off"/>
            </div>
            <div className="form-group">
              <label className="form-label">{t('form_people')} <span className="form-opt">{t('label_optional')}</span></label>
              <input className="form-input" value={form.friends||''} onChange={e=>F('friends',e.target.value)} placeholder={t('ph_people')} autoComplete="off"/>
            </div>
          </div>
        </Modal>
      )}
      {modal==='note'&&sel&&(
        <Modal title={t('modal_notes')} onClose={()=>setModal(null)}
          footer={<><button className="btn-modal-cancel" onClick={()=>setModal(null)}>{t('btn_cancel')}</button><button className="btn-modal-ok" onClick={submitNote}>{t('btn_save')}</button></>}>
          <div style={{marginBottom:12,padding:'10px 13px',background:'#f5f5f5',borderRadius:14,border:'1.5px solid #ddd'}}>
            <div style={{fontFamily:'var(--mono)',fontSize:'0.58rem',color:'#666'}}>{sel.cameraName} · {sel.filmName}</div>
          </div>
          <div className="form-group">
            <label className="form-label">{t('form_notes')}</label>
            <textarea className="form-textarea" value={form.notes||''} onChange={e=>F('notes',e.target.value)} placeholder={t('ph_notes')}/>
          </div>
        </Modal>
      )}
      {modal==='lab'&&sel&&(
        <Modal title={t('modal_send_lab')} onClose={()=>setModal(null)}
          footer={<><button className="btn-modal-cancel" onClick={()=>setModal(null)}>{t('btn_cancel')}</button><button className="btn-modal-ok" onClick={submitLab}>{t('btn_confirm')}</button></>}>
          <div style={{marginBottom:14,padding:'10px 13px',background:'#f5f5f5',borderRadius:14,border:'1.5px solid #ddd'}}>
            <div style={{fontFamily:'var(--body)',fontWeight:900,marginBottom:3,color:'#000'}}>{sel.filmName}</div>
            <div style={{fontFamily:'var(--mono)',fontSize:'0.58rem',color:'#666'}}>{sel.cameraName}{sel.notes&&` · 「${sel.notes}」`}</div>
          </div>
          <div className="form-group">
            <label className="form-label">{t('form_lab_name')}</label>
            <input className="form-input" value={form.lab||''} onChange={e=>F('lab',e.target.value)} placeholder={t('ph_lab_name')} autoComplete="off"/>
          </div>
          <div className="form-group">
            <label className="form-label">{t('form_dev_price')}</label>
            <div className="price-wrap">
              <span className="price-prefix">$</span>
              <input className="form-input price-input" type="number" value={form.devPrice||''} onChange={e=>F('devPrice',e.target.value)} placeholder="0.00" min="0" step="0.01"/>
            </div>
          </div>
        </Modal>
      )}
      {modal==='cameras'&&(
        <Modal title={t('modal_manage_cam')} onClose={()=>setModal(null)} single
          footer={<button className="btn-modal-cancel" onClick={()=>setModal(null)}>{t('btn_close')}</button>}>
          {state.cameras.length===0
            ?<div style={{textAlign:'center',padding:'24px 0',fontFamily:'var(--mono)',fontSize:'0.58rem',color:'#888',letterSpacing:2}}>{t('empty_cam')}</div>
            :state.cameras.map(cam=>{
              const active=state.rolls.find(r=>r.cameraId===cam.id&&r.status==='loaded');
              return (
                <div key={cam.id} className="cam-manage-row">
                  <div style={{flex:1}}>
                    <div className="cam-manage-name">{cam.name}</div>
                    <div className="cam-manage-sub">{active?`${t('cam_status_loaded')}${active.filmName}`:t('cam_status_empty')}</div>
                  </div>
                  <button className="btn-danger" onClick={()=>deleteCamera(cam.id)}>{t('btn_delete')}</button>
                </div>
              );
            })
          }
          <div style={{padding:'10px 0 2px',fontFamily:'var(--mono)',fontSize:'0.53rem',color:'#888',letterSpacing:2,textTransform:'uppercase'}}>{t('cam_delete_hint')}</div>
        </Modal>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════
// ③ LAB TAB
// ═══════════════════════════════════════════════════
function LabTab({state,dispatch,toast,t}){
  const [modal,setModal]=useState(null);
  const [sel,setSel]=useState(null);
  const [form,setForm]=useState({});
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));

  const developing=useMemo(()=>state.rolls.filter(r=>r.status==='developing'),[state.rolls]);
  const archived  =useMemo(()=>[...state.rolls.filter(r=>r.status==='archived')].sort((a,b)=>(b.archivedAt||'').localeCompare(a.archivedAt||'')),[state.rolls]);

  function openArchive(roll){setSel(roll);setForm({downloadUrl:roll.downloadUrl||'',folderName:genFolderName(roll)});setModal('archive');}
  function submitArchive(){
    const folder=form.folderName||genFolderName(sel);
    dispatch({type:'UPDATE_ROLL',id:sel.id,updates:{status:'archived',archivedAt:nowISO(),downloadUrl:form.downloadUrl,folderName:folder}});
    dispatch({type:'LOG',entry:{id:uid(),type:'archive',date:today(),timestamp:nowISO(),title:`入庫：${sel.filmName}`,detail:folder}});
    toast(`✓ 入庫完成：${folder}`);setModal(null);
  }
  function togglePosted(roll){
    const next=!roll.posted;
    dispatch({type:'UPDATE_ROLL',id:roll.id,updates:{posted:next}});
    if(next){dispatch({type:'LOG',entry:{id:uid(),type:'post',date:today(),timestamp:nowISO(),title:`發佈：${roll.filmName}`,detail:roll.folderName||''}});toast(t('msg_posted'));}
  }
  async function copyText(t){
    try{
      if(navigator.clipboard&&window.isSecureContext){
        await navigator.clipboard.writeText(t);
      } else {
        // fallback for non-HTTPS / PWA webview
        const ta=document.createElement('textarea');
        ta.value=t; ta.style.cssText='position:fixed;left:-9999px;top:-9999px;opacity:0';
        document.body.appendChild(ta); ta.focus(); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
      }
      toast(t('msg_copied'));
    }catch(e){ toast(t('err_copy')); }
  }

  function MetaLine({roll}){
    const p=[roll.theme,roll.location,roll.friends].filter(Boolean);
    if(!p.length)return null;
    return <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:5}}>{p.map((x,i)=><span key={i} className="meta-tag">{x}</span>)}</div>;
  }

  return (
    <div style={{paddingBottom:8}}>
      <div className="sec-head"><span className="sec-title">{t('title_developing')}</span><span className="sec-count">{developing.length}</span></div>
      {developing.length===0&&<div className="empty" style={{padding:'24px 20px'}}><span style={{fontSize:'1.6rem',display:'block',marginBottom:8}}>🧪</span>{t('empty_developing')}</div>}
      {developing.map(roll=>(
        <div key={roll.id} className="card" style={{borderLeft:'3px solid var(--c-dev)',background:'#FFF5E8'}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3,flexWrap:'wrap'}}>
              <div className="card-title">{roll.filmName}</div>
              <span className="pill developing">{t('pill_developing')}</span>
              {roll.devPrice>0&&<span style={{fontFamily:'var(--mono)',fontSize:'0.56rem',color:'#555',fontWeight:700,marginLeft:'auto'}}>沖費 {fmtPrice(roll.devPrice)}</span>}
            </div>
            <div className="card-sub">{roll.cameraName} · {roll.lab}{roll.sentAt&&` · ${formatDate(roll.sentAt)}`}</div>
            {roll.notes&&<div className="notes-display">「{roll.notes}」</div>}
            <MetaLine roll={roll}/>
          </div>
          <div className="card-actions">
            <button className="btn-cta" onClick={()=>openArchive(roll)}>{t('btn_archive')}</button>
          </div>
        </div>
      ))}
      <div className="divider"/>
      <div className="sec-head"><span className="sec-title">{t('title_archived')}</span><span className="sec-count">{archived.length}</span></div>
      {archived.length===0&&<div className="empty" style={{padding:'24px 20px'}}><span style={{fontSize:'1.6rem',display:'block',marginBottom:8}}>📁</span>{t('empty_archived')}</div>}
      {archived.map(roll=>(
        <div key={roll.id} className="card" style={{borderLeft:`3px solid ${roll.posted?'#bbb':'var(--c-arch)'}`,opacity:roll.posted?0.65:1}}>
          <div style={{marginBottom:10}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,flexWrap:'wrap'}}>
              <div className="card-title">{roll.filmName}</div>
              {roll.posted?<span className="pill posted">{t('pill_posted')}</span>:<span className="pill archived">{t('pill_archived')}</span>}
            </div>
            <div className="card-sub">{roll.cameraName} · {formatDate(roll.archivedAt)}</div>
            <MetaLine roll={roll}/>
          </div>
          {roll.folderName&&<div className="folder-box"><div className="folder-text">📂 {roll.folderName}</div><button className="folder-copy-btn" onClick={()=>copyText(roll.folderName)}>{t('btn_copy')}</button></div>}
          <div className="toggle-row">
            <label className="toggle"><input type="checkbox" checked={roll.posted} onChange={()=>togglePosted(roll)}/><div className="toggle-track"/></label>
            <span className="toggle-label">{roll.posted?t('toggle_posted'):t('toggle_ready')}</span>
          </div>
        </div>
      ))}
      {modal==='archive'&&sel&&(
        <Modal title={t('modal_archive')} onClose={()=>setModal(null)}
          footer={<><button className="btn-modal-cancel" onClick={()=>setModal(null)}>{t('btn_cancel')}</button><button className="btn-modal-ok" onClick={submitArchive}>{t('btn_confirm_archive')}</button></>}>
          <div style={{marginBottom:14,padding:'10px 13px',background:'#f5f5f5',borderRadius:14,border:'1.5px solid #ddd'}}>
            <div style={{fontFamily:'var(--body)',fontWeight:900,marginBottom:3,color:'#000'}}>{sel.filmName}</div>
            <div style={{fontFamily:'var(--mono)',fontSize:'0.58rem',color:'#666'}}>{sel.cameraName}{sel.lab&&` · ${sel.lab}`}</div>
            {[sel.theme,sel.location,sel.friends].filter(Boolean).length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:6}}>{[sel.theme&&`🎭 ${sel.theme}`,sel.location&&`📍 ${sel.location}`,sel.friends&&`👥 ${sel.friends}`].filter(Boolean).map((p,i)=><span key={i} className="meta-tag">{p}</span>)}</div>}
          </div>
          <div className="form-group">
            <label className="form-label">{t('form_auto_name')}</label>
            <div className="folder-box" style={{marginBottom:8}}><div className="folder-text">{form.folderName}</div><button className="folder-copy-btn" onClick={()=>copyText(form.folderName)}>{t('btn_copy')}</button></div>
            <label className="form-label" style={{marginTop:8}}>{t('form_custom_name')} <span className="form-opt">{t('label_optional')}</span></label>
            <input className="form-input" value={form.folderName} onChange={e=>F('folderName',e.target.value)}/>
          </div>
          <div className="form-group">
            <label className="form-label">{t('form_link')} <span className="form-opt">{t('label_optional')}</span></label>
            <input className="form-input" type="url" value={form.downloadUrl} onChange={e=>F('downloadUrl',e.target.value)} placeholder="https://..."/>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════
// ④ LOG TAB — 3-col dashboard + calendar + split log sections
// ═══════════════════════════════════════════════════
function getTypeMeta(t){return{stock:{ch:t('log_type_stock')},load:{ch:t('log_type_load')},note:{ch:t('log_type_note')},unload:{ch:t('log_type_unload')},lab:{ch:t('log_type_lab')},archive:{ch:t('log_type_archive')},post:{ch:t('log_type_post')}};}

function LogTab({state,t}){
  const now=new Date();
  const [calYear, setCalYear] =useState(now.getFullYear());
  const [calMonth,setCalMonth]=useState(now.getMonth());
  const [selDate, setSelDate] =useState(null);
  const todayStr=now.toISOString().slice(0,10);

  const eventMap=useMemo(()=>{const m={};(state.log||[]).forEach(ev=>{if(!m[ev.date])m[ev.date]=[];m[ev.date].push(ev);});return m;},[state.log]);

  function prevMonth(){if(calMonth===0){setCalYear(y=>y-1);setCalMonth(11);}else setCalMonth(m=>m-1);setSelDate(null);}
  function nextMonth(){if(calMonth===11){setCalYear(y=>y+1);setCalMonth(0);}else setCalMonth(m=>m+1);setSelDate(null);}

  const yyyymm=`${calYear}-${String(calMonth+1).padStart(2,'0')}`;
  const monthLabel=new Date(calYear,calMonth,1).toLocaleDateString('zh-HK',{year:'numeric',month:'long'});

  // Monthly stats
  const {monthSpend,monthFilmSpend,monthDevSpend,monthBuyQty,monthLoadQty}=useMemo(()=>{
    let spend=0,filmSpend=0,devSpend=0,buyQty=0,loadQty=0;
    Object.entries(eventMap).forEach(([d,evs])=>{
      if(!d.startsWith(yyyymm))return;
      evs.forEach(ev=>{
        if(ev.type==='stock'){filmSpend+=ev.price||0;spend+=ev.price||0;buyQty+=ev.qty||0;}
        if(ev.type==='lab'){devSpend+=ev.devPrice||0;spend+=ev.devPrice||0;}
        if(ev.type==='load')loadQty++;
      });
    });
    return {monthSpend:spend,monthFilmSpend:filmSpend,monthDevSpend:devSpend,monthBuyQty:buyQty,monthLoadQty:loadQty};
  },[eventMap,yyyymm]);

  // Top 5
  const top5=useMemo(()=>{
    const c={};
    Object.entries(eventMap).forEach(([d,evs])=>{
      if(!d.startsWith(yyyymm))return;
      evs.filter(e=>e.type==='load').forEach(e=>{
        const m=e.title.match(/裝片：(.+?)→|入機：(.+?)→/);
        const n=m?(m[1]||m[2]).trim():e.title.replace(/裝片：|入機：/,'').trim();
        c[n]=(c[n]||0)+1;
      });
    });
    return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,5);
  },[eventMap,yyyymm]);
  const maxC=top5[0]?.[1]||1;

  // Calendar cells
  const cells=useMemo(()=>{
    const fd=new Date(calYear,calMonth,1).getDay();
    const dm=new Date(calYear,calMonth+1,0).getDate();
    const pd=new Date(calYear,calMonth,0).getDate();
    const r=[];
    for(let i=fd-1;i>=0;i--)r.push({day:pd-i,type:'prev',dateStr:null});
    for(let d=1;d<=dm;d++){const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;r.push({day:d,type:'cur',dateStr:ds});}
    const rem=r.length%7;if(rem>0)for(let d=1;d<=7-rem;d++)r.push({day:d,type:'next',dateStr:null});
    return r;
  },[calYear,calMonth]);

  const selEvents=selDate?(eventMap[selDate]||[]).filter(e=>e.type==='stock'||e.type==='load').sort((a,b)=>a.timestamp.localeCompare(b.timestamp)):[];

  // Split month log: last 10 of each type
  const recentStock=useMemo(()=>[...state.log].filter(e=>e.type==='stock').sort((a,b)=>b.timestamp.localeCompare(a.timestamp)).slice(0,5),[state.log]);
  const recentLoad =useMemo(()=>[...state.log].filter(e=>e.type==='load').sort((a,b)=>b.timestamp.localeCompare(a.timestamp)).slice(0,5),[state.log]);

  const rankCls=i=>i===0?'gold':i===1?'silver':i===2?'bronze':'';
  const barCls =i=>i===0?'':i===1?'silver':i===2?'bronze':'rest';

  return (
    <div className="log-wrap">
      {/* 3-column dashboard */}
      <div className="dashboard-3">
        <div className="dash-card">
          <div className="dash-card-label">{t('dash_spend')}</div>
          <div className="dash-card-value" style={{fontSize:'1.2rem'}}>{fmtPrice(monthSpend)}</div>

        </div>
        <div className="dash-card" style={{borderLeft:'1px solid var(--g3)'}}>
          <div className="dash-card-label">{t('dash_load')}</div>
          <div className="dash-card-value">{monthLoadQty}</div>

        </div>
        <div className="dash-card" style={{borderLeft:'1px solid var(--g3)'}}>
          <div className="dash-card-label">{t('dash_buy')}</div>
          <div className="dash-card-value">{monthBuyQty}</div>

        </div>
      </div>

      {/* Top 5 */}
      <div className="top5-block">
        <div className="top5-header">
          <span className="top5-title">{t('title_top5')}</span>
          <span className="top5-title-month">{monthLabel}</span>
        </div>
        {top5.length===0
          ?<div className="top5-empty">{t('empty_top5')}</div>
          :<div className="top5-list">{top5.map(([name,count],i)=>(
              <div key={name} className="top5-row">
                <span className={`top5-rank ${rankCls(i)}`}>#{i+1}</span>
                <span className="top5-film-name">{name}</span>
                <div className="top5-bar-wrap"><div className={`top5-bar ${barCls(i)}`} style={{width:`${Math.round((count/maxC)*100)}%`}}/></div>
                <span className="top5-count">{count}</span>
              </div>
            ))}</div>
        }
      </div>

      {/* Calendar nav */}
      <div className="cal-nav">
        <button className="cal-nav-btn" onClick={prevMonth}>‹</button>
        <div className="cal-month-label">{monthLabel}</div>
        <button className="cal-nav-btn" onClick={nextMonth}>›</button>
      </div>
      <div className="cal-grid">{(t('days_of_week')||['日','一','二','三','四','五','六']).map(d=><div key={d} className="cal-dow">{d}</div>)}</div>
      <div className="cal-grid">
        {cells.map((cell,i)=>{
          if(cell.type!=='cur')return<div key={`p${i}`} className="cal-cell other-month"><div className="cal-date">{cell.day}</div></div>;
          const evs=eventMap[cell.dateStr]||[];
          const dotTypes=[...new Set(evs.map(e=>e.type))].slice(0,4);
          const isSel=cell.dateStr===selDate,isToday=cell.dateStr===todayStr;
          return(
            <div key={cell.dateStr} className={`cal-cell ${isToday?'today':''} ${isSel?'selected':''} ${evs.length?'has-event':''}`}
              onClick={()=>evs.length&&setSelDate(isSel?null:cell.dateStr)}>
              <div className="cal-date">{cell.day}</div>
              {dotTypes.length>0&&<div className="cal-dots">{dotTypes.map(t=><div key={t} className={`cal-dot ${t}`}/>)}</div>}
            </div>
          );
        })}
      </div>

      {/* Day detail panel */}
      {selDate?(
        <div className="day-panel">
          <div className="day-panel-header">
            <div className="day-panel-date">{formatDate(selDate)}</div>
            <div className="day-panel-count">{selEvents.length} {t('unit_roll')}</div>
          </div>
          {selEvents.length===0
            ?<div style={{padding:'14px 16px',fontFamily:'var(--mono)',fontSize:'0.56rem',color:'#888',letterSpacing:2,textTransform:'uppercase'}}>{t('cal_empty')}</div>
            :<div className="day-events-scroll">
              {selEvents.map(ev=>(
                <div key={ev.id} className="day-event-card">
                  <div className={`day-event-type ${ev.type}`}>[{getTypeMeta(t)[ev.type]?.ch||ev.type}]</div>
                  <div className="day-event-main">{ev.title.replace(/^[^：]+：/,'')}</div>
                  {ev.detail&&<div className="day-event-sub">{ev.detail}</div>}
                  {ev.price>0&&<div className="day-event-sub" style={{color:'#B8960A'}}>購入 {fmtPrice(ev.price)}</div>}
                  <div className="day-event-time">{formatTS(ev.timestamp)}</div>
                </div>
              ))}
            </div>
          }
        </div>
      ):<div className="cal-hint">{t('cal_hint')}</div>}

      {/* ── Dual split log blocks ── */}
      <div className="log-split" style={{marginTop:8}}>
        {/* 📥 Recent stock-in */}
        <div>
          <div className="log-section-head">
            <span className="log-section-title">{t('title_recent_stock')}</span>
            <span className="log-section-count">{recentStock.length}</span>
          </div>
          {recentStock.length===0&&<div style={{padding:'14px 16px',fontFamily:'var(--mono)',fontSize:'0.56rem',color:'#888',letterSpacing:2,textTransform:'uppercase'}}>{t('empty_recent_stock')}</div>}
          {recentStock.map(ev=>(
            <div key={ev.id} className="log-item">
              <div className="log-dot-col"><div className="log-dot stock"/></div>
              <div className="log-body">
                <div className="log-main">{ev.title.replace(/^入庫：/,'')}</div>
                {ev.detail&&<div className="log-detail">{ev.detail}</div>}
                {ev.price>0&&<div className="log-price">{fmtPrice(ev.price)}</div>}
              </div>
              <div className="log-time">{formatDate(ev.date)}</div>
            </div>
          ))}
        </div>

        <div className="divider"/>

        {/* 📷 Recent loads */}
        <div>
          <div className="log-section-head">
            <span className="log-section-title">{t('title_recent_load')}</span>
            <span className="log-section-count">{recentLoad.length}</span>
          </div>
          {recentLoad.length===0&&<div style={{padding:'14px 16px',fontFamily:'var(--mono)',fontSize:'0.56rem',color:'#888',letterSpacing:2,textTransform:'uppercase'}}>{t('empty_recent_load')}</div>}
          {recentLoad.map(ev=>(
            <div key={ev.id} className="log-item">
              <div className="log-dot-col"><div className="log-dot load"/></div>
              <div className="log-body">
                <div className="log-main">{ev.title.replace(/^上機：|^裝片：|^入機：/,'')}</div>
                {ev.detail&&ev.detail!=='庫存 -1'&&<div className="log-detail">{ev.detail}</div>}
              </div>
              <div className="log-time">{formatDate(ev.date)}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

        {n:500,   label:(t('tier_spent')||[])[1]||'',icon:'🔥'},
        {n:1000,  label:(t('tier_spent')||[])[2]||'',icon:'💰'},
        {n:3000,  label:(t('tier_spent')||[])[3]||'',icon:'💎'},
        {n:10000, label:(t('tier_spent')||[])[4]||'',icon:'👑'},
      ]},

}

function BadgesTab({state,t}){
  // Compute stats from state
  const stats=useMemo(()=>{
    const log=state.log||[];
    const totalBought=log.filter(e=>e.type==='stock').reduce((s,e)=>s+Number(e.qty||0),0);
    const brandsUsed=new Set(state.films.filter(f=>f.brand&&f.brand.trim()).map(f=>f.brand.trim())).size;
    const totalLoaded=log.filter(e=>e.type==='load').length;
    const activeMonths=new Set(log.filter(e=>e.type==='load'&&e.date).map(e=>String(e.date).slice(0,7)).filter(m=>m.length===7)).size;
    const totalSpent=log.reduce((s,e)=>{
      if(e.type==='stock')return s+Number(e.price||0);
      if(e.type==='lab')  return s+Number(e.devPrice||0);
      return s;
    },0);
    return {totalBought,brandsUsed,totalLoaded,activeMonths,totalSpent};
  },[state]);

  const valueFor={hoarded:stats.totalBought,brands:stats.brandsUsed,loaded:stats.totalLoaded,months:stats.activeMonths,spent:stats.totalSpent};

  return (
    <div className="badges-wrap">
      <div style={{padding:'14px 16px 4px',borderBottom:'1px solid var(--g3)',background:'var(--k-yellow)'}}>
        <div style={{fontFamily:'var(--display)',fontSize:'1.1rem',fontWeight:900,color:'#B8960A'}}>{t('title_badges')}</div>
        <div style={{fontFamily:'var(--mono)',fontSize:'0.5rem',color:'#888',letterSpacing:2,textTransform:'uppercase',marginTop:3}}>{t('subtitle_badges')}</div>
      </div>

      {getBadgeDefs(t).map(cat=>{
        const val=valueFor[cat.id]||0;
        return (
          <div key={cat.id} className="badge-category">
            <div className="badge-cat-title">
              <span className="badge-cat-icon">{cat.icon}</span>
              {cat.title}
              <span style={{fontFamily:'var(--body)',fontSize:'0.62rem',color:'#888',fontWeight:400,textTransform:'none',letterSpacing:0,marginLeft:4}}>— {cat.desc}</span>
              <span style={{marginLeft:'auto',fontFamily:'var(--display)',fontSize:'0.85rem',fontWeight:800,color:'#B8960A'}}>
                {cat.id==='spent'?fmtPrice(val):val}
              </span>
            </div>
            <div className="badge-row">
              {cat.tiers.map((tier,ti)=>{
                const unlocked=val>=tier.n;
                const progress=Math.min(1,val/tier.n);
                return (
                  <div key={ti} className={`badge-item ${unlocked?'unlocked':'locked'}`}>
                    <div className="badge-icon-wrap">
                      {tier.icon}
                      {unlocked&&<div className="badge-check">✓</div>}
                    </div>
                    <div className="badge-name">{tier.label}</div>
                    <div className="badge-progress-bar"><div className="badge-progress-fill" style={{width:`${progress*100}%`}}/></div>
                    <div className="badge-target">
                      {cat.id==='spent'?fmtPrice(tier.n):`${tier.n}`}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ═══════════════════════════════════════════════════
// REDUCER
// ═══════════════════════════════════════════════════
function reducer(state,action){
  let s={...state};
  switch(action.type){
    case 'ADD_FILM_AND_STOCK':
      s.films=[...state.films,action.film];
      s.stock={...state.stock,[action.film.id]:action.qty};
      s.log=[...state.log,{id:uid(),type:'stock',date:today(),timestamp:nowISO(),
        title:`入庫：${action.qty} 卷 ${action.film.brand} ${action.film.name}`,
        detail:`購入價格 ${fmtPrice(action.price)}`,price:action.price||0,qty:action.qty}]; break;
    case 'ADD_STOCK':{
      const prev=state.stock[action.filmId]||0;
      s.stock={...state.stock,[action.filmId]:prev+action.qty};
      s.log=[...state.log,{id:uid(),type:'stock',date:today(),timestamp:nowISO(),
        title:`入庫：${action.qty} 卷 ${action.notes}`,
        detail:`庫存 +${action.qty} → ${prev+action.qty} · ${fmtPrice(action.price)}`,
        price:action.price||0,qty:action.qty}]; break;}
    case 'ADJUST_STOCK':{
      const c=state.stock[action.filmId]||0;
      s.stock={...state.stock,[action.filmId]:Math.max(0,c+action.delta)}; break;}
    case 'ADD_CAMERA':    s.cameras=[...state.cameras,action.camera]; break;
    case 'DELETE_CAMERA': s.cameras=state.cameras.filter(c=>c.id!==action.camId); break;
    case 'LOAD_FILM':{
      const c=state.stock[action.filmId]||0;
      s.stock={...state.stock,[action.filmId]:Math.max(0,c-1)};
      s.rolls=[...state.rolls,action.roll];
      const r=action.roll,meta=[r.theme,r.location,r.friends].filter(Boolean).join('、');
      s.log=[...state.log,{id:uid(),type:'load',date:today(),timestamp:nowISO(),
        title:`裝片：${r.filmName} → ${r.cameraName}`,detail:meta||''}]; break;}
    case 'UPDATE_ROLL': s.rolls=state.rolls.map(r=>r.id===action.id?{...r,...action.updates}:r); break;
    case 'LOG':         s.log=[...state.log,action.entry]; break;
    default: break;
  }
  saveDB(s); return s;
}

// ═══════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════
function App(){
  const [state,dispatch]=React.useReducer(reducer,null,loadDB);
  const [tab,setTab]=useState('stock');
  const {msg,vis,show}=useToast();

  // ── i18n state ──
  const [lang,setLang]=useState(()=>localStorage.getItem('app_language')||'');
  const [showLangModal,setShowLangModal]=useState(!localStorage.getItem('app_language'));

  // ── IG handle state ──
  const [igHandle,setIgHandle]=useState(()=>localStorage.getItem('app_ig_handle')||'henrywmho');

  const t=useCallback((key)=>{
    const dict=translations[lang]||translations['zh-HK'];
    const val=dict[key];
    return val!==undefined?val:key;
  },[lang]);

  useEffect(()=>{
    document.title=`${t('app_title')} · ${t('app_subtitle')}`;
  },[t]);

  function selectLang(code){
    setLang(code);
    localStorage.setItem('app_language',code);
    setShowLangModal(false);
  }

  const TABS_i18n=[
    {id:'stock',  icon:'🧊', label:t('nav_stock')},
    {id:'shoot',  icon:'📷', label:t('nav_shoot')},
    {id:'lab',    icon:'🧪', label:t('nav_lab')},
    {id:'log',    icon:'🗓', label:t('nav_log')},
    {id:'badges', icon:'🏅', label:t('nav_badges')},
  ];

  const totalRolls =useMemo(()=>Object.values(state.stock).reduce((s,v)=>s+v,0),[state.stock]);
  const loadedCount=useMemo(()=>state.rolls.filter(r=>r.status==='loaded').length,[state.rolls]);

  if(showLangModal&&!lang){
    return <LangModal onSelect={selectLang} onClose={null} igHandle={igHandle} setIgHandle={setIgHandle}/>;
  }

  return (
    <div className="app">
      {/* Language Modal (settings) */}
      {showLangModal&&lang&&(
        <LangModal onSelect={selectLang} onClose={()=>setShowLangModal(false)} igHandle={igHandle} setIgHandle={setIgHandle}/>
      )}

      <header className="topbar">
        <div className="logo-mark">
          <img src="logo.png" alt="logo" style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:'4px'}}/>
        </div>
        <div className="topbar-titles">
          <div className="topbar-name">{t('app_title')}</div>
          <div className="topbar-sub">{t('app_subtitle')}</div>
        </div>
        <a href={`https://www.instagram.com/${igHandle}/`} target="_blank" rel="noopener noreferrer" className="topbar-ig">
          <span className="topbar-ig-icon">📸</span>
          <span className="topbar-ig-text">
            {igHandle==='henrywmho'?'@henrywmho':'Instagram'}
          </span>
        </a>
        {/* Settings gear */}
        <button className="topbar-settings" onClick={()=>setShowLangModal(true)} aria-label="Language settings">⚙️</button>
        <div className="topbar-chips">
          <div className="topbar-stat">
            <span className="topbar-stat-num">{totalRolls}</span>
            <span className="topbar-stat-label">{t('stat_stock')}</span>
          </div>
          <div className="topbar-stat">
            <span className="topbar-stat-num">{loadedCount}</span>
            <span className="topbar-stat-label">{t('stat_loaded')}</span>
          </div>
        </div>
      </header>

      <div className="view-container">
        {tab==='stock' &&<StockTab  state={state} dispatch={dispatch} toast={show} t={t}/>}
        {tab==='shoot' &&<ShootTab  state={state} dispatch={dispatch} toast={show} t={t}/>}
        {tab==='lab'   &&<LabTab    state={state} dispatch={dispatch} toast={show} t={t}/>}
        {tab==='log'   &&<LogTab    state={state} t={t}/>}
        {tab==='badges'&&<BadgesTab state={state} t={t}/>}
        <div style={{fontFamily:'var(--mono)',fontSize:'0.55rem',color:'#aaa',
          textAlign:'center',padding:'24px 0 32px',letterSpacing:'1px'}}>
          FilmVault made by IG @{igHandle}
        </div>
      </div>

      <nav className="bottom-nav">
        {TABS_i18n.map(tb=>(
          <button key={tb.id} className={`nav-item ${tab===tb.id?'active':''}`} onClick={()=>setTab(tb.id)}>
            <span className="nav-icon">{tb.icon}</span>
            <span className="nav-label">{tb.label}</span>
          </button>
        ))}
      </nav>

      <div className="toast-wrap">
        <div className={`toast ${vis?'show':''}`}>{msg}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
<script>
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
</script>
</body>
</html>
