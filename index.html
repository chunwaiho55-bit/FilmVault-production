<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="FilmVault">
<link rel="manifest" href="manifest.json">
<title>FilmVault · 菲林庫</title>

<!-- React 18 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<!-- Barcode scanner -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<!-- Recharts (CDN — no npm install needed) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=DM+Mono:wght@300;400;500&family=Noto+Sans+HK:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════
   FILMVAULT v5 — Kodak Design System
   Black base · Kodak Yellow accent
   ⚠ Warning: Kodak Orange (NOT red) for expired/low
═══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* ── Kodak Palette ── */
  --k-yellow:   #FFD100;
  --k-yellow2:  #FFB81C;
  --k-orange:   #F58220;   /* ⚠ Expired / Low stock — replaces red */
  --k-orange2:  #D96D10;
  --k-red:      #ED1C24;   /* Only for destructive actions (delete) */
  --k-black:    #000000;
  --k-black2:   #0D0D0D;

  /* ── Greys ── */
  --g2: #1E1E1E;
  --g3: #2A2A2A;
  --g4: #3A3A3A;
  --g5: #555555;
  --g6: #888888;
  --g7: #BBBBBB;

  /* ── State colours ── */
  --c-load:   #FFD100;
  --c-unload: #6699CC;
  --c-dev:    #FF9020;
  --c-arch:   #44BB88;

  /* ── Typography ── */
  --mono:    'DM Mono', monospace;
  --display: 'Syne', sans-serif;
  --body:    'Noto Sans HK', sans-serif;

  /* ── Layout ── */
  --safe-b:  env(safe-area-inset-bottom, 0px);
  --r:       4px;
}

html, body { height: 100%; overflow: hidden; background: var(--k-black); }
body { font-family: var(--body); color: #EEE; -webkit-font-smoothing: antialiased; }
#root { height: 100%; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--g4); border-radius: 2px; }

/* ══════════ SHELL ══════════ */
.app { display: flex; flex-direction: column; height: 100%; overflow: hidden; }

/* ─── TOPBAR ─── */
.topbar {
  flex-shrink: 0; background: var(--k-black);
  border-bottom: 2px solid var(--k-yellow);
  padding: 0 16px; height: 54px;
  display: flex; align-items: center; gap: 10px;
}
.topbar-name { font-family: var(--display); font-size: 1.3rem; font-weight: 900; color: var(--k-yellow); letter-spacing: -0.5px; }
.topbar-sub  { font-family: var(--mono); font-size: 0.48rem; color: var(--g5); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
.topbar-stats { margin-left: auto; display: flex; gap: 0; }
.topbar-stat { text-align: center; padding: 0 12px; border-left: 1px solid var(--g3); }
.topbar-stat-num   { font-family: var(--display); font-size: 1.2rem; font-weight: 900; color: var(--k-yellow); line-height: 1; display: block; }
.topbar-stat-label { font-family: var(--mono); font-size: 0.44rem; color: var(--g5); letter-spacing: 1.5px; text-transform: uppercase; display: block; margin-top: 1px; }

/* ─── CONTENT ─── */
.view-container { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; background: var(--k-black); }

/* ─── BOTTOM NAV ─── */
.bottom-nav { flex-shrink: 0; background: var(--k-black); border-top: 1px solid var(--g3); display: grid; grid-template-columns: repeat(4, 1fr); padding-bottom: var(--safe-b); }
.nav-item { background: none; border: none; cursor: pointer; padding: 10px 4px 8px; display: flex; flex-direction: column; align-items: center; gap: 3px; color: var(--g5); transition: color 0.15s; -webkit-tap-highlight-color: transparent; position: relative; }
.nav-item.active { color: var(--k-yellow); }
.nav-item.active::before { content: ''; position: absolute; top: 0; left: 20%; right: 20%; height: 2px; background: var(--k-yellow); }
.nav-icon  { font-size: 1.1rem; line-height: 1; }
.nav-label { font-family: var(--mono); font-size: 0.48rem; letter-spacing: 1.5px; text-transform: uppercase; }

/* ══════════ SHARED ══════════ */
.sec-head { display: flex; align-items: center; padding: 14px 16px 10px; border-bottom: 1px solid var(--g3); gap: 8px; position: sticky; top: 0; background: var(--k-black); z-index: 5; }
.sec-title { font-family: var(--mono); font-size: 0.56rem; letter-spacing: 3px; text-transform: uppercase; color: var(--g5); flex: 1; }
.sec-count { font-family: var(--display); font-size: 1.1rem; font-weight: 800; color: var(--k-yellow); }

.card { background: var(--g2); border: 1px solid var(--g3); border-radius: var(--r); padding: 14px 16px; margin: 0 12px 8px; }
.card-title { font-family: var(--body); font-size: 0.95rem; font-weight: 700; color: #EEE; margin-bottom: 3px; }
.card-sub   { font-family: var(--mono); font-size: 0.62rem; color: var(--g6); letter-spacing: 0.5px; }

/* ─── CTA BUTTONS (全站統一: Yellow底 + 黑字) ─── */
.btn-cta {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  background: var(--k-yellow); border: none; color: var(--k-black);
  font-family: var(--display); font-size: 0.85rem; font-weight: 800; letter-spacing: 0.5px;
  padding: 11px 18px; border-radius: var(--r); cursor: pointer;
  transition: background 0.12s, transform 0.08s; -webkit-tap-highlight-color: transparent; white-space: nowrap;
}
.btn-cta:active { background: var(--k-yellow2); transform: scale(0.97); }

.fab {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: calc(100% - 24px); margin: 12px 12px;
  background: var(--k-yellow); color: var(--k-black); border: none; cursor: pointer;
  padding: 16px 20px; font-family: var(--display); font-size: 1.05rem; font-weight: 900;
  letter-spacing: 0.5px; border-radius: var(--r);
  transition: background 0.12s, transform 0.08s; -webkit-tap-highlight-color: transparent;
}
.fab:active   { background: var(--k-yellow2); transform: scale(0.98); }
.fab:disabled { background: var(--g3); color: var(--g5); cursor: not-allowed; transform: none; }
.fab-icon { font-size: 1.1rem; }

.btn-ghost {
  display: inline-flex; align-items: center; justify-content: center; gap: 5px;
  background: transparent; border: 1px solid var(--g4); color: var(--g7);
  font-family: var(--mono); font-size: 0.58rem; letter-spacing: 1.5px; text-transform: uppercase;
  padding: 6px 12px; border-radius: var(--r); cursor: pointer; transition: all 0.12s;
  -webkit-tap-highlight-color: transparent; white-space: nowrap;
}
.btn-ghost:hover, .btn-ghost:active { border-color: var(--k-yellow); color: var(--k-yellow); }

.btn-danger {
  display: inline-flex; align-items: center; justify-content: center;
  background: transparent; border: 1px solid rgba(237,28,36,0.5); color: var(--k-red);
  font-family: var(--mono); font-size: 0.58rem; letter-spacing: 1px; text-transform: uppercase;
  padding: 6px 12px; border-radius: var(--r); cursor: pointer; transition: all 0.12s;
  -webkit-tap-highlight-color: transparent; white-space: nowrap;
}
.btn-danger:active { background: rgba(237,28,36,0.1); }

/* ─── PILLS ─── */
.pill { display: inline-block; font-family: var(--mono); font-size: 0.48rem; letter-spacing: 1.5px; text-transform: uppercase; padding: 3px 7px; border-radius: 2px; border: 1px solid; }
.pill.loaded     { background: rgba(255,209,0,0.1);    border-color: var(--k-yellow2);  color: var(--k-yellow); }
.pill.unloaded   { background: rgba(102,153,204,0.1);  border-color: #4477AA;           color: var(--c-unload); }
.pill.developing { background: rgba(255,144,32,0.1);   border-color: #CC7020;           color: var(--c-dev); }
.pill.archived   { background: rgba(68,187,136,0.1);   border-color: #229966;           color: var(--c-arch); }
/* ⚠ Expired/Low now use Kodak Orange, not red */
.pill.expired    { background: rgba(245,130,32,0.12);  border-color: var(--k-orange2);  color: var(--k-orange); }
.pill.low-stock  { background: rgba(245,130,32,0.12);  border-color: var(--k-orange2);  color: var(--k-orange); }
.pill.posted     { background: var(--g4); border-color: var(--g5); color: #EEE; }
.pill.opt        { background: transparent; border-color: var(--g4); color: var(--g5); font-size: 0.44rem; }

/* ─── FORM ─── */
.form-group { margin-bottom: 16px; }
.form-label { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 0.55rem; letter-spacing: 2px; text-transform: uppercase; color: var(--g6); margin-bottom: 7px; }
.form-opt   { font-family: var(--mono); font-size: 0.43rem; color: var(--g4); letter-spacing: 1px; padding: 1px 5px; border: 1px solid var(--g4); border-radius: 2px; }
.form-input, .form-select, .form-textarea {
  width: 100%; background: var(--g3); border: 1px solid var(--g4); color: #EEE;
  font-family: var(--mono); font-size: 0.9rem; padding: 11px 13px;
  border-radius: var(--r); outline: none; appearance: none; -webkit-appearance: none; transition: border-color 0.15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--k-yellow); }
.form-input::placeholder { color: var(--g4); }
.form-textarea { min-height: 70px; resize: none; line-height: 1.5; font-family: var(--body); font-size: 0.85rem; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-section-label { font-family: var(--mono); font-size: 0.5rem; letter-spacing: 3px; text-transform: uppercase; color: var(--g4); margin: 4px 0 14px; display: flex; align-items: center; gap: 8px; }
.form-section-label::before, .form-section-label::after { content: ''; flex: 1; height: 1px; background: var(--g3); }

/* ─── Price input with $ prefix ─── */
.price-wrap { position: relative; }
.price-prefix {
  position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
  font-family: var(--mono); font-size: 0.9rem; color: var(--k-yellow); font-weight: 700;
  pointer-events: none; z-index: 1;
}
.price-input { padding-left: 26px !important; }

/* ─── MODAL ─── */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
.modal { background: var(--g2); width: 100%; max-width: 520px; border-radius: 10px 10px 0 0; border-top: 3px solid var(--k-yellow); max-height: 92dvh; display: flex; flex-direction: column; animation: slideUp 0.26s cubic-bezier(0.32,0.72,0,1); overflow: hidden; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-drag   { width: 36px; height: 3px; background: var(--g4); border-radius: 2px; margin: 10px auto 0; flex-shrink: 0; }
.modal-header { padding: 14px 20px 12px; border-bottom: 1px solid var(--g3); flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; }
.modal-title  { font-family: var(--display); font-size: 1.15rem; font-weight: 900; color: var(--k-yellow); letter-spacing: -0.5px; }
.modal-close  { background: var(--g3); border: 1px solid var(--g4); color: var(--g6); font-size: 0.8rem; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: var(--r); }
.modal-body   { padding: 20px 20px 0; overflow-y: auto; flex: 1; }
.modal-footer { padding: 14px 20px; padding-bottom: calc(14px + var(--safe-b)); border-top: 1px solid var(--g3); display: grid; grid-template-columns: 1fr 1.8fr; gap: 10px; flex-shrink: 0; background: var(--g2); }
.modal-footer.single { grid-template-columns: 1fr; }

.btn-modal-cancel { background: transparent; border: 1px solid var(--g4); color: var(--g6); font-family: var(--mono); font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; padding: 13px; cursor: pointer; border-radius: var(--r); transition: all 0.15s; }
.btn-modal-ok     { background: var(--k-yellow); border: none; color: var(--k-black); font-family: var(--display); font-size: 0.95rem; font-weight: 900; padding: 13px; cursor: pointer; border-radius: var(--r); transition: background 0.12s; }
.btn-modal-ok:active { background: var(--k-yellow2); }
.btn-modal-ok.red { background: var(--k-red); color: #fff; }

/* ─── SCANNER ─── */
.scanner-trigger { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; background: var(--g3); border: 1.5px dashed var(--g4); color: var(--k-yellow); font-family: var(--mono); font-size: 0.62rem; letter-spacing: 2px; text-transform: uppercase; padding: 13px; cursor: pointer; border-radius: var(--r); margin-bottom: 16px; transition: all 0.15s; }
.scanner-trigger:hover { border-color: var(--k-yellow); background: rgba(255,209,0,0.05); }
.scanner-box { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; border-radius: var(--r); overflow: hidden; margin-bottom: 14px; display: none; }
.scanner-box.active { display: block; }
.scanner-box video, .scanner-box canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.scanner-reticle { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 2; }
.scanner-rect { width: 72%; aspect-ratio: 3.5/1; border: 2px solid var(--k-yellow); border-radius: 3px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.6); }
@keyframes scanFlash { 0%,100% { border-color: var(--k-yellow); } 50% { border-color:#fff; box-shadow:0 0 0 9999px rgba(0,0,0,0.3),0 0 24px var(--k-yellow); } }
.scanner-rect.flash { animation: scanFlash 0.35s ease; }
.scanner-close-btn { position: absolute; top: 8px; right: 8px; z-index: 3; background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 0.7rem; padding: 5px 9px; cursor: pointer; border-radius: var(--r); font-family: var(--mono); }

/* ─── FOLDER NAME ─── */
.folder-box { background: var(--k-black); border: 1px solid var(--g4); color: var(--k-yellow); font-family: var(--mono); font-size: 0.75rem; letter-spacing: 0.5px; padding: 12px 14px; border-radius: var(--r); display: flex; align-items: center; gap: 8px; margin-bottom: 10px; word-break: break-all; }
.folder-text { flex: 1; line-height: 1.5; }
.folder-copy-btn { background: var(--g3); border: 1px solid var(--g4); color: var(--g7); font-family: var(--mono); font-size: 0.55rem; padding: 5px 8px; cursor: pointer; border-radius: 2px; letter-spacing: 1px; flex-shrink: 0; transition: all 0.15s; white-space: nowrap; }
.folder-copy-btn:active { background: var(--k-yellow); color: var(--k-black); border-color: var(--k-yellow); }

/* ─── TOGGLE ─── */
.toggle-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
.toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-track { position: absolute; inset: 0; background: var(--g4); border-radius: 11px; cursor: pointer; transition: background 0.2s; }
.toggle input:checked + .toggle-track { background: var(--k-yellow); }
.toggle-track::after { content: ''; position: absolute; left: 3px; top: 3px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
.toggle input:checked + .toggle-track::after { transform: translateX(18px); background: var(--k-black); }
.toggle-label { font-family: var(--mono); font-size: 0.62rem; color: var(--g6); letter-spacing: 1px; flex: 1; }

/* ─── META / NOTES ─── */
.meta-tags  { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.meta-tag   { font-family: var(--mono); font-size: 0.55rem; color: var(--g6); background: var(--g3); border: 1px solid var(--g4); padding: 2px 8px; border-radius: 2px; }
.notes-display { font-family: var(--mono); font-size: 0.65rem; color: var(--k-yellow2); margin-top: 5px; font-style: italic; }

/* ─── MISC ─── */
.empty { text-align: center; padding: 48px 20px; font-family: var(--mono); font-size: 0.6rem; color: var(--g5); letter-spacing: 2px; text-transform: uppercase; line-height: 2.2; }
.empty-icon { font-size: 2.5rem; display: block; margin-bottom: 12px; opacity: 0.25; }
.divider { height: 6px; background: var(--k-black); border-top: 1px solid var(--g3); border-bottom: 1px solid var(--g3); margin: 4px 0 0; }

/* ─── STOCK QTY ─── */
.stock-qty      { font-family: var(--display); font-size: 2rem; font-weight: 900; color: #EEE; line-height: 1; }
/* ⚠ Low/expired → orange */
.stock-qty.low  { color: var(--k-orange); }
.stock-qty.zero { color: var(--g4); }
.qty-row { display: flex; align-items: center; gap: 5px; }
.qty-btn { width: 26px; height: 22px; background: var(--g3); border: 1px solid var(--g4); color: var(--g7); font-size: 0.9rem; cursor: pointer; border-radius: 2px; display: flex; align-items: center; justify-content: center; transition: all 0.1s; -webkit-tap-highlight-color: transparent; }
.qty-btn:hover { border-color: var(--k-yellow); color: var(--k-yellow); }

/* ─── RIGHT-ALIGNED CARD ACTIONS ─── */
.card-actions { display: flex; align-items: center; justify-content: flex-end; gap: 8px; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--g3); }

/* ─── CAMERA MANAGE ─── */
.cam-manage-row { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--g3); }
.cam-manage-name { flex: 1; font-family: var(--body); font-size: 0.85rem; color: #EEE; }
.cam-manage-sub  { font-family: var(--mono); font-size: 0.55rem; color: var(--g5); }

/* ═══════════════════════════════════════
   LOG TAB — Annual Chart + Dashboard + Calendar
═══════════════════════════════════════ */
.log-wrap { padding-bottom: 20px; }

/* ─── Annual Chart block ─── */
.chart-block {
  background: var(--k-black2);
  border-bottom: 1px solid var(--g3);
  padding: 14px 0 10px;
}
.chart-header {
  display: flex; align-items: baseline; gap: 8px;
  padding: 0 16px 10px;
}
.chart-title {
  font-family: var(--mono); font-size: 0.52rem; letter-spacing: 3px;
  text-transform: uppercase; color: var(--g5); flex: 1;
}
.chart-year {
  font-family: var(--display); font-size: 0.8rem; font-weight: 800; color: var(--k-yellow);
}
.chart-legend {
  display: flex; gap: 14px; padding: 0 16px 2px;
}
.legend-item {
  display: flex; align-items: center; gap: 5px;
  font-family: var(--mono); font-size: 0.5rem; letter-spacing: 1px;
  text-transform: uppercase; color: var(--g6);
}
.legend-bar  { width: 10px; height: 10px; border-radius: 2px; background: var(--k-yellow); flex-shrink: 0; }
.legend-line { width: 16px; height: 2px; background: #9DCEFF; flex-shrink: 0; position: relative; }
.legend-line::after { content:''; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:5px; height:5px; border-radius:50%; background:#9DCEFF; }

/* ─── Dashboard metrics ─── */
.dashboard {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--g3);
  border-bottom: 1px solid var(--g3);
}
.dash-card {
  background: var(--k-black);
  padding: 14px 16px 12px;
}
.dash-card-label {
  font-family: var(--mono); font-size: 0.5rem; letter-spacing: 3px;
  text-transform: uppercase; color: var(--g5); margin-bottom: 5px;
  display: flex; align-items: center; gap: 6px;
}
.dash-card-value {
  font-family: var(--display); font-size: 1.6rem; font-weight: 900;
  color: var(--k-yellow); line-height: 1;
}
.dash-card-sub {
  font-family: var(--mono); font-size: 0.52rem; color: var(--g5);
  margin-top: 3px; letter-spacing: 0.5px;
}
/* Top 5 takes the full width below the 2 metric cards */
.top5-block {
  background: var(--k-black);
  border-bottom: 1px solid var(--g3);
  padding: 12px 16px 14px;
}
.top5-header {
  display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px;
}
.top5-title {
  font-family: var(--mono); font-size: 0.52rem; letter-spacing: 3px;
  text-transform: uppercase; color: var(--g5); flex: 1;
}
.top5-title-month {
  font-family: var(--display); font-size: 0.75rem; font-weight: 800; color: var(--k-yellow);
}
.top5-list { display: flex; flex-direction: column; gap: 7px; }
.top5-row  { display: flex; align-items: center; gap: 8px; }
.top5-rank { font-family: var(--display); font-size: 0.7rem; font-weight: 900; color: var(--g4); width: 16px; text-align: right; flex-shrink: 0; }
.top5-rank.gold   { color: var(--k-yellow); }
.top5-rank.silver { color: var(--g7); }
.top5-rank.bronze { color: #CD7F32; }
.top5-bar-wrap { flex: 1; background: var(--g3); height: 6px; border-radius: 3px; overflow: hidden; }
.top5-bar        { height: 100%; background: var(--k-yellow); border-radius: 3px; transition: width 0.4s ease; }
.top5-bar.silver { background: var(--g7); }
.top5-bar.bronze { background: #CD7F32; }
.top5-bar.rest   { background: var(--g5); }
.top5-film-name  { font-family: var(--mono); font-size: 0.62rem; color: var(--g7); min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; }
.top5-count      { font-family: var(--display); font-size: 0.75rem; font-weight: 800; color: #EEE; min-width: 18px; text-align: right; flex-shrink: 0; }
.top5-empty      { font-family: var(--mono); font-size: 0.6rem; color: var(--g5); letter-spacing: 2px; text-transform: uppercase; text-align: center; padding: 6px 0; }

/* ─── Calendar nav ─── */
.cal-nav {
  display: flex; align-items: center; gap: 10px; padding: 10px 16px;
  border-bottom: 1px solid var(--g3);
  background: var(--k-black); position: sticky; top: 0; z-index: 5;
}
.cal-nav-btn { background: var(--g3); border: 1px solid var(--g4); color: var(--g7); font-family: var(--mono); font-size: 1rem; width: 32px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: var(--r); transition: all 0.12s; -webkit-tap-highlight-color: transparent; }
.cal-nav-btn:hover { border-color: var(--k-yellow); color: var(--k-yellow); }
.cal-month-label { flex: 1; text-align: center; font-family: var(--display); font-size: 0.95rem; font-weight: 900; letter-spacing: 0.5px; color: #EEE; }

/* ─── Calendar grid ─── */
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--g3); }
.cal-dow  { background: var(--k-black); text-align: center; padding: 7px 2px; font-family: var(--mono); font-size: 0.5rem; color: var(--g5); letter-spacing: 1px; }
.cal-cell { background: var(--k-black2); min-height: 48px; padding: 5px 3px 3px; cursor: default; transition: background 0.1s; }
.cal-cell.has-event        { cursor: pointer; }
.cal-cell.has-event:hover  { background: var(--g2); }
.cal-cell.other-month      { opacity: 0.25; pointer-events: none; }
.cal-cell.today .cal-date  { color: var(--k-yellow); font-weight: 700; }
.cal-cell.selected         { background: var(--g3) !important; outline: 1px solid var(--k-yellow); outline-offset: -1px; }
.cal-date  { font-family: var(--mono); font-size: 0.58rem; color: var(--g5); text-align: center; margin-bottom: 3px; }
.cal-dots  { display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; padding: 0 2px; }
.cal-dot   { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.cal-dot.stock   { background: #6699CC; }
.cal-dot.load    { background: var(--k-yellow); }
.cal-dot.unload  { background: var(--g5); }
.cal-dot.lab     { background: var(--c-dev); }
.cal-dot.archive { background: var(--c-arch); }
.cal-dot.post    { background: #EEE; }
.cal-dot.note    { background: var(--g5); }

/* ─── Day detail panel ─── */
.day-panel { border-top: 2px solid var(--k-yellow); background: var(--k-black); }
.day-panel-header { padding: 10px 16px 8px; background: rgba(255,209,0,0.05); border-bottom: 1px solid var(--g3); display: flex; align-items: baseline; gap: 8px; }
.day-panel-date  { font-family: var(--display); font-size: 0.95rem; font-weight: 900; color: var(--k-yellow); }
.day-panel-count { font-family: var(--mono); font-size: 0.52rem; color: var(--g5); letter-spacing: 2px; text-transform: uppercase; }

/* ─── Day events: horizontal scroll ─── */
.day-events-scroll { display: flex; gap: 8px; padding: 12px 16px 14px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.day-events-scroll::-webkit-scrollbar { display: none; }
.day-event-card { flex-shrink: 0; background: var(--g2); border: 1px solid var(--g3); border-radius: var(--r); padding: 10px 12px; min-width: 148px; max-width: 190px; }
.day-event-type { font-family: var(--mono); font-size: 0.5rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
.day-event-type.stock { color: #6699CC; }
.day-event-type.load  { color: var(--k-yellow); }
.day-event-main { font-family: var(--body); font-size: 0.82rem; font-weight: 700; color: #EEE; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.day-event-sub  { font-family: var(--mono); font-size: 0.58rem; color: var(--g6); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.day-event-time { font-family: var(--mono); font-size: 0.5rem; color: var(--g4); margin-top: 5px; }

/* ─── Month timeline (no date selected — hidden per spec #4) ─── */
/* Only shown when selDate !== null in v5; when null, nothing is shown below calendar */
.tl-date-label { font-family: var(--mono); font-size: 0.55rem; color: var(--g5); letter-spacing: 3px; text-transform: uppercase; padding: 12px 16px 8px; border-bottom: 1px solid var(--g3); }
.tl-event { display: flex; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--g3); }
.tl-dot-col { display: flex; flex-direction: column; align-items: center; padding-top: 3px; width: 10px; flex-shrink: 0; }
.tl-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.tl-dot.stock   { background: #6699CC; }
.tl-dot.load    { background: var(--k-yellow); }
.tl-dot.note    { background: var(--g5); }
.tl-dot.unload  { background: var(--g5); }
.tl-dot.lab     { background: var(--c-dev); }
.tl-dot.archive { background: var(--c-arch); }
.tl-dot.post    { background: #EEE; }
.tl-body   { flex: 1; }
.tl-type   { font-family: var(--mono); font-size: 0.5rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 3px; }
.tl-type.stock   { color: #6699CC; }
.tl-type.load    { color: var(--k-yellow); }
.tl-type.note    { color: var(--g5); }
.tl-type.unload  { color: var(--g5); }
.tl-type.lab     { color: var(--c-dev); }
.tl-type.archive { color: var(--c-arch); }
.tl-type.post    { color: #EEE; }
.tl-main   { font-family: var(--body); font-size: 0.85rem; font-weight: 500; color: #EEE; margin-bottom: 2px; }
.tl-detail { font-family: var(--mono); font-size: 0.6rem; color: var(--g5); }
.tl-time   { font-family: var(--mono); font-size: 0.5rem; color: var(--g4); padding-top: 4px; flex-shrink: 0; }

/* ─── Prompt hint when no date selected ─── */
.cal-hint {
  text-align: center; padding: 20px 16px;
  font-family: var(--mono); font-size: 0.55rem; letter-spacing: 2px;
  text-transform: uppercase; color: var(--g4);
  border-top: 1px solid var(--g3);
}

/* ─── TOAST ─── */
.toast-wrap { position: fixed; bottom: calc(68px + var(--safe-b) + 12px); left: 50%; transform: translateX(-50%); z-index: 200; pointer-events: none; }
.toast { background: var(--k-yellow); color: var(--k-black); font-family: var(--mono); font-size: 0.7rem; font-weight: 500; letter-spacing: 1px; padding: 10px 18px; border-radius: 20px; white-space: nowrap; opacity: 0; transform: translateY(8px); transition: all 0.25s ease; max-width: calc(100vw - 40px); overflow: hidden; text-overflow: ellipsis; }
.toast.show { opacity: 1; transform: translateY(0); }

select option { background: var(--g3); color: #EEE; }

/* Recharts custom tooltip */
.chart-tooltip { background: var(--g2) !important; border: 1px solid var(--g4) !important; border-radius: var(--r); padding: 8px 12px; font-family: var(--mono); font-size: 0.62rem; color: #EEE; }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ══════════════════════════════════════════
// DB — v7: adds price(film cost) & devPrice to rolls
// ══════════════════════════════════════════
const DB_KEY = 'ff_v7';

const defaultState = {
  films:    [],   // { id, name, expiry, barcodes[] }
  stock:    {},   // { [filmId]: qty }
  cameras:  [],   // { id, name }
  rolls:    [],   // ActiveRoll — see schema below
  log:      [],   // LogEvent { id, type, date, timestamp, title, detail, price?, devPrice? }
  barcodeDB:{}    // { [barcode]: filmName }
};

/*
ActiveRoll v7 schema:
  id, filmId, filmName, cameraId, cameraName,
  status: 'loaded'|'unloaded'|'developing'|'archived',
  loadedAt, unloadedAt, sentAt, archivedAt,
  notes, theme, location, friends,
  price,      ← NEW: 購買價格 (from Add Stock)
  devPrice,   ← NEW: 沖曬費用 (from Send to Lab)
  lab, downloadUrl, folderName, posted

LogEvent:
  id, type, date, timestamp, title, detail
  price?    ← stored on stock events for monthly totals
  devPrice? ← stored on lab events for monthly totals
*/

function migrateRoll(r) {
  return { theme:'', location:'', friends:'', notes:'', price:0, devPrice:0, ...r };
}
function migrateFilm(f) {
  // Remove format/frames if present (no longer in schema)
  const { format, frames, iso, ...rest } = f;
  return rest;
}

function loadDB() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      return { ...defaultState, ...d, rolls: (d.rolls||[]).map(migrateRoll), films: (d.films||[]).map(migrateFilm) };
    }
    // Migrate from v6
    for (const k of ['ff_v6','ff_v5','ff_v4']) {
      const old = localStorage.getItem(k);
      if (old) {
        const d = JSON.parse(old);
        return { ...defaultState, ...d, rolls:(d.rolls||[]).map(migrateRoll), films:(d.films||[]).map(migrateFilm) };
      }
    }
  } catch(e) {}
  return { ...defaultState };
}

function saveDB(s) { try { localStorage.setItem(DB_KEY, JSON.stringify(s)); } catch(e) {} }

function uid()   { return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function today() { return new Date().toISOString().slice(0,10); }
function nowISO(){ return new Date().toISOString(); }

function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso.slice(0,10)+'T12:00:00').toLocaleDateString('zh-HK',{year:'numeric',month:'short',day:'numeric'});
}
function formatTS(iso) { return new Date(iso).toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit'}); }
function isExpired(expiry) {
  if (!expiry) return false;
  const e = new Date(expiry+(expiry.length===7?'-01':''));
  const n = new Date(); return e < new Date(n.getFullYear(),n.getMonth(),1);
}
function sanitize(s) {
  if (!s) return '';
  return s.trim().replace(/\s+/g,'').replace(/[^a-zA-Z0-9\u4e00-\u9fff\u3040-\u309f\u30a0-\u30ff]/g,'').slice(0,24);
}
function genFolderName(roll) {
  const date = (roll.loadedAt||roll.archivedAt||nowISO()).slice(0,7).replace('-','');
  return [date,sanitize(roll.cameraName),sanitize(roll.filmName),sanitize(roll.theme),sanitize(roll.location),sanitize(roll.friends)].filter(Boolean).join('_');
}
function fmtPrice(n) {
  if (!n && n!==0) return '—';
  return '$'+Number(n).toLocaleString('en',{minimumFractionDigits:0,maximumFractionDigits:2});
}

// ── TOAST ──
let _tt;
function useToast() {
  const [msg,setMsg]=useState('');
  const [vis,setVis]=useState(false);
  const show=useCallback(m=>{setMsg(m);setVis(true);clearTimeout(_tt);_tt=setTimeout(()=>setVis(false),2400);},[]);
  return {msg,vis,show};
}

// ── SCANNER HOOK ──
function useScanner(onDetected) {
  const [active,setActive]=useState(false);
  const ref=useRef(null); const running=useRef(false);
  const start=useCallback(()=>{if(window.Quagga&&!running.current)setActive(true);},[]);
  const stop=useCallback(()=>{
    if(!running.current)return;
    try{Quagga.stop();}catch(e){} running.current=false; setActive(false);
  },[]);
  useEffect(()=>{
    if(!active||!ref.current)return;
    Quagga.init({inputStream:{name:'Live',type:'LiveStream',target:ref.current,constraints:{facingMode:'environment',aspectRatio:{min:1,max:2}}},decoder:{readers:['ean_reader','ean_8_reader','upc_reader','upc_e_reader','code_128_reader']},locate:true},err=>{
      if(err){setActive(false);return;} Quagga.start(); running.current=true;
    });
    const h=d=>{onDetected(d.codeResult.code);stop();};
    Quagga.onDetected(h);
    return()=>{try{Quagga.offDetected(h);}catch(e){} if(running.current){try{Quagga.stop();}catch(e){} running.current=false;}};
  },[active]);
  return {active,start,stop,ref};
}

function BarcodeScanner({onCode}) {
  const [flash,setFlash]=useState(false);
  const h=useCallback(c=>{setFlash(true);setTimeout(()=>setFlash(false),400);onCode(c);},[onCode]);
  const {active,start,stop,ref}=useScanner(h);
  return (
    <div>
      {!active&&<button className="scanner-trigger" onClick={start}><span>▦</span> 掃描條碼 SCAN <span className="form-opt">OPTIONAL</span></button>}
      <div className={`scanner-box ${active?'active':''}`} ref={ref}>
        <div className="scanner-reticle"><div className={`scanner-rect ${flash?'flash':''}`}/></div>
        <button className="scanner-close-btn" onClick={stop}>✕ 關閉</button>
      </div>
    </div>
  );
}

function Modal({title,onClose,children,footer,single}) {
  useEffect(()=>{const h=e=>{if(e.key==='Escape')onClose();};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);},[onClose]);
  return (
    <div className="modal-bg" onClick={e=>{if(e.target.className==='modal-bg')onClose();}}>
      <div className="modal">
        <div className="modal-drag"/>
        <div className="modal-header"><div className="modal-title">{title}</div><button className="modal-close" onClick={onClose}>✕</button></div>
        <div className="modal-body">{children}</div>
        {footer&&<div className={`modal-footer ${single?'single':''}`}>{footer}</div>}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════
// ① STOCK TAB
// ── Change: removed Format/Frames; added Price (required)
// ── Change: expired/low use orange
// ══════════════════════════════════════════
function StockTab({state,dispatch,toast}) {
  const EMPTY={name:'',qty:'1',expiry:'',price:''};
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState(EMPTY);
  const [scanned,setScanned]=useState(null);
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));

  const filmList=useMemo(()=>
    state.films.map(f=>({...f,qty:state.stock[f.id]||0,expired:isExpired(f.expiry)})).sort((a,b)=>a.name.localeCompare(b.name)),
    [state.films,state.stock]);
  const totalRolls=useMemo(()=>Object.values(state.stock).reduce((s,v)=>s+v,0),[state.stock]);

  function handleCode(code) {
    setScanned(code);
    const known=state.barcodeDB[code];
    if(known){setForm(f=>({...f,name:known}));toast(`識別到：${known}`);}
    else toast(`條碼 ${code} — 請輸入名稱綁定`);
    setShowAdd(true);
  }

  function handleSubmit() {
    if(!form.name.trim()){toast('請輸入菲林名稱（必填）');return;}
    const priceVal=parseFloat(form.price);
    if(!form.price||isNaN(priceVal)||priceVal<0){toast('請輸入購買價格（必填）');return;}
    const qty=parseInt(form.qty)||1;
    if(scanned&&form.name.trim()) dispatch({type:'BIND_BARCODE',code:scanned,name:form.name.trim()});
    const existing=state.films.find(f=>f.name.toLowerCase()===form.name.trim().toLowerCase());
    if(existing){
      dispatch({type:'ADD_STOCK',filmId:existing.id,qty,notes:form.name.trim(),price:priceVal});
    }else{
      dispatch({type:'ADD_FILM_AND_STOCK',film:{id:uid(),name:form.name.trim(),expiry:form.expiry,barcodes:scanned?[scanned]:[]},qty,price:priceVal});
    }
    toast(`✓ 入庫 ${qty} 卷 ${form.name.trim()} · $${priceVal}`);
    setShowAdd(false);setForm(EMPTY);setScanned(null);
  }

  return (
    <div style={{paddingBottom:8}}>
      {/* Stats */}
      <div style={{display:'flex',gap:1,background:'var(--g3)',borderBottom:'1px solid var(--g3)'}}>
        {[
          {n:totalRolls, l:'庫存總卷', warn:false},
          {n:filmList.filter(f=>f.qty>0&&!f.expired).length, l:'菲林種類', warn:false},
          {n:filmList.filter(f=>f.expired&&f.qty>0).length, l:'已過期', warn:true}
        ].map(s=>(
          <div key={s.l} style={{flex:1,background:'var(--k-black)',padding:'12px 8px',textAlign:'center'}}>
            <div style={{fontFamily:'var(--display)',fontSize:'1.8rem',fontWeight:900,lineHeight:1,
              color:s.warn&&s.n>0?'var(--k-orange)':'var(--k-yellow)'}}>{s.n}</div>
            <div style={{fontFamily:'var(--mono)',fontSize:'0.5rem',color:'var(--g5)',letterSpacing:2,textTransform:'uppercase',marginTop:3}}>{s.l}</div>
          </div>
        ))}
      </div>

      <button className="fab" onClick={()=>{setScanned(null);setForm(EMPTY);setShowAdd(true);}}>
        <span className="fab-icon">📦</span> 入庫 · Add Stock
      </button>

      <div className="sec-head">
        <span className="sec-title">🧊 庫存列表</span>
        <span className="sec-count">{filmList.filter(f=>f.qty>0).length}</span>
      </div>

      {filmList.length===0&&<div className="empty"><span className="empty-icon">📦</span>庫存空空如也<br/>點擊「入庫」開始</div>}

      {filmList.map(film=>{
        const low=film.qty>0&&film.qty<=2, zero=film.qty===0;
        // ⚠ border & text colour: orange for expired/low, yellow for normal
        const accentColor=film.expired?'var(--k-orange)':low?'var(--k-orange)':zero?'var(--g4)':'var(--k-yellow)';
        return (
          <div key={film.id} className="card" style={{borderLeft:`3px solid ${accentColor}`}}>
            <div style={{display:'flex',alignItems:'flex-start',gap:12}}>
              <div style={{flex:1,minWidth:0}}>
                <div className="card-title" style={{color:film.expired?'var(--k-orange)':undefined}}>
                  {film.name}
                  {film.expired&&<span className="pill expired" style={{marginLeft:8}}>已過期</span>}
                  {low&&!film.expired&&<span className="pill low-stock" style={{marginLeft:8}}>低庫存</span>}
                </div>
                <div className="card-sub" style={{marginTop:4}}>
                  {film.expiry?`有效期至 ${film.expiry}`:''}
                </div>
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
                <div className={`stock-qty ${low&&!film.expired?'low':zero?'zero':''}`} style={{color:film.expired?'var(--k-orange)':undefined}}>{film.qty}</div>
                <div className="qty-row">
                  <button className="qty-btn" onClick={()=>dispatch({type:'ADJUST_STOCK',filmId:film.id,delta:1})}>+</button>
                  <button className="qty-btn" onClick={()=>dispatch({type:'ADJUST_STOCK',filmId:film.id,delta:-1})}>−</button>
                </div>
              </div>
            </div>
          </div>
        );
      })}

      {/* ADD STOCK MODAL */}
      {showAdd&&(
        <Modal title="入庫 · Add Stock" onClose={()=>setShowAdd(false)}
          footer={<><button className="btn-modal-cancel" onClick={()=>setShowAdd(false)}>取消</button><button className="btn-modal-ok" onClick={handleSubmit}>確認入庫</button></>}>
          <BarcodeScanner onCode={handleCode}/>
          <div className="form-group">
            <label className="form-label">菲林名稱 FILM NAME</label>
            <input className="form-input" value={form.name} onChange={e=>F('name',e.target.value)}
              placeholder="e.g. Kodak Portra 400" list="fp" autoComplete="off"/>
            <datalist id="fp">
              {['Kodak Portra 400','Kodak Portra 160','Kodak Portra 800','Kodak Ektar 100','Kodak Gold 200','Kodak ColorPlus 200','Kodak UltraMax 400','Ilford HP5 Plus 400','Ilford FP4 Plus 125','Ilford Delta 400','Fujifilm Superia 400','Fujifilm Pro 400H','Fujifilm Velvia 50','Cinestill 800T','Cinestill 400D','LomoChrome Purple 400','Kodak T-Max 400','Rollei RPX 400'].map(n=><option key={n} value={n}/>)}
            </datalist>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">數量 QTY</label>
              <input className="form-input" type="number" value={form.qty} onChange={e=>F('qty',e.target.value)} min="1" max="99"/>
            </div>
            <div className="form-group">
              <label className="form-label">購買價格 PRICE</label>
              <div className="price-wrap">
                <span className="price-prefix">$</span>
                <input className="form-input price-input" type="number" value={form.price} onChange={e=>F('price',e.target.value)}
                  placeholder="0.00" min="0" step="0.01"/>
              </div>
            </div>
          </div>
          <div className="form-section-label">可選欄位 · Optional</div>
          <div className="form-group">
            <label className="form-label">有效期限 EXPIRY <span className="form-opt">OPT</span></label>
            <input className="form-input" type="month" value={form.expiry} onChange={e=>F('expiry',e.target.value)}/>
          </div>
          {scanned&&<div style={{fontFamily:'var(--mono)',fontSize:'0.58rem',color:'var(--g5)',marginBottom:16}}>條碼：{scanned}</div>}
        </Modal>
      )}
    </div>
  );
}

// ══════════════════════════════════════════
// ② SHOOT TAB
// ══════════════════════════════════════════
function ShootTab({state,dispatch,toast}) {
  const [modal,setModal]=useState(null);
  const [sel,setSel]=useState(null);
  const [form,setForm]=useState({});
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));

  const loaded  =useMemo(()=>state.rolls.filter(r=>r.status==='loaded'),[state.rolls]);
  const unloaded=useMemo(()=>state.rolls.filter(r=>r.status==='unloaded'),[state.rolls]);
  const avail   =useMemo(()=>state.films.filter(f=>(state.stock[f.id]||0)>0),[state.films,state.stock]);
  const freeCams=state.cameras.filter(c=>!state.rolls.find(r=>r.cameraId===c.id&&r.status==='loaded'));

  function submitLoad() {
    if(!form.filmId){toast('請選擇菲林');return;}
    const camName=form.cameraNew.trim()||state.cameras.find(c=>c.id===form.cameraId)?.name;
    if(!camName){toast('請選擇或輸入相機名稱');return;}
    const film=state.films.find(f=>f.id===form.filmId);
    let cam=state.cameras.find(c=>c.name.toLowerCase()===camName.toLowerCase());
    if(!cam){cam={id:uid(),name:camName};dispatch({type:'ADD_CAMERA',camera:cam});}
    // Find purchase price from last stock log for this film
    const filmStockLogs=state.log.filter(l=>l.type==='stock'&&l.title.includes(film.name));
    const lastPrice=filmStockLogs.length?filmStockLogs[filmStockLogs.length-1].price||0:0;
    const roll={id:uid(),filmId:film.id,filmName:film.name,cameraId:cam.id,cameraName:cam.name,
      status:'loaded',loadedAt:nowISO(),notes:'',
      theme:form.theme.trim(),location:form.location.trim(),friends:form.friends.trim(),
      price:lastPrice,devPrice:0,lab:'',downloadUrl:'',folderName:'',posted:false};
    dispatch({type:'LOAD_FILM',roll,filmId:film.id});
    toast(`✓ ${film.name} 裝入 ${cam.name}`);setModal(null);
  }

  function submitNote() {
    dispatch({type:'UPDATE_ROLL',id:sel.id,updates:{notes:form.notes}});
    dispatch({type:'LOG',entry:{id:uid(),type:'note',date:today(),timestamp:nowISO(),
      title:`更新拍攝備註`,detail:`${sel.filmName} — ${form.notes}`}});
    toast('✓ 備註已更新');setModal(null);
  }

  function unloadRoll(roll) {
    dispatch({type:'UPDATE_ROLL',id:roll.id,updates:{status:'unloaded',unloadedAt:nowISO()}});
    dispatch({type:'LOG',entry:{id:uid(),type:'unload',date:today(),timestamp:nowISO(),
      title:`退片：${roll.filmName}`,detail:`from ${roll.cameraName}`}});
    toast(`✓ ${roll.filmName} 已退片`);
  }

  function submitLab() {
    if(!form.lab?.trim()){toast('請輸入沖曬店名稱');return;}
    const devP=parseFloat(form.devPrice);
    if(!form.devPrice||isNaN(devP)||devP<0){toast('請輸入沖曬費用（必填）');return;}
    dispatch({type:'UPDATE_ROLL',id:sel.id,updates:{status:'developing',lab:form.lab.trim(),sentAt:nowISO(),devPrice:devP}});
    dispatch({type:'LOG',entry:{id:uid(),type:'lab',date:today(),timestamp:nowISO(),
      title:`送沖曬：${sel.filmName}`,detail:`沖曬店：${form.lab.trim()} · $${devP}`,devPrice:devP}});
    toast(`✓ 已送往 ${form.lab.trim()} · $${devP}`);setModal(null);
  }

  function deleteCamera(camId) {
    const cam=state.cameras.find(c=>c.id===camId);
    if(state.rolls.some(r=>r.cameraId===camId&&r.status==='loaded')){toast('此相機有菲林服役中，請先退片');return;}
    dispatch({type:'DELETE_CAMERA',camId});toast(`已刪除 ${cam?.name}`);
  }

  function MetaTags({roll}) {
    const tags=[roll.theme&&`🎭 ${roll.theme}`,roll.location&&`📍 ${roll.location}`,roll.friends&&`👥 ${roll.friends}`].filter(Boolean);
    return <div>{roll.notes&&<div className="notes-display">「{roll.notes}」</div>}{tags.length>0&&<div className="meta-tags">{tags.map((t,i)=><span key={i} className="meta-tag">{t}</span>)}</div>}</div>;
  }

  return (
    <div style={{paddingBottom:8}}>
      <div style={{display:'flex',gap:8,padding:'8px 12px 0'}}>
        <button className="fab" style={{margin:0,flex:1}} onClick={()=>{setForm({filmId:avail[0]?.id||'',cameraId:'',cameraNew:'',theme:'',location:'',friends:''});setModal('load');}} disabled={avail.length===0}>
          <span className="fab-icon">📷</span> 裝片 · Load Film {avail.length===0?'(庫存不足)':''}
        </button>
        <button onClick={()=>setModal('cameras')} style={{background:'var(--g3)',border:'1px solid var(--g4)',color:'var(--g7)',padding:'0 14px',borderRadius:'var(--r)',cursor:'pointer',fontFamily:'var(--mono)',fontSize:'0.6rem',letterSpacing:'1px',flexShrink:0,transition:'all 0.12s'}}>管理相機</button>
      </div>

      <div className="sec-head" style={{marginTop:8}}><span className="sec-title">📷 服役中</span><span className="sec-count">{loaded.length}</span></div>
      {loaded.length===0&&<div className="empty"><span className="empty-icon">📷</span>機身目前空置</div>}
      {loaded.map(roll=>(
        <div key={roll.id} className="card" style={{borderLeft:'3px solid var(--k-yellow)'}}>
          <div style={{marginBottom:0}}>
            <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:3}}>
              <div className="card-title">{roll.cameraName}</div>
              <span className="pill loaded">服役中</span>
            </div>
            <div className="card-sub">{roll.filmName} · {formatDate(roll.loadedAt)}</div>
            <MetaTags roll={roll}/>
          </div>
          <div className="card-actions">
            <button className="btn-ghost" onClick={()=>{setSel(roll);setForm({notes:roll.notes||''});setModal('note');}}>✏ 備註</button>
            <button className="btn-cta" onClick={()=>unloadRoll(roll)}>退片 →</button>
          </div>
        </div>
      ))}

      <div className="divider"/>
      <div className="sec-head"><span className="sec-title">⏳ 等待送沖</span><span className="sec-count">{unloaded.length}</span></div>
      {unloaded.length===0&&<div className="empty" style={{padding:'24px 20px'}}><span style={{fontSize:'1.5rem',display:'block',marginBottom:8,opacity:0.25}}>⏳</span>暫無等待送沖的底片</div>}
      {unloaded.map(roll=>(
        <div key={roll.id} className="card" style={{borderLeft:'3px solid var(--g5)'}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
              <div className="card-title">{roll.filmName}</div>
              <span className="pill unloaded">已退片</span>
            </div>
            <div className="card-sub">{roll.cameraName} · {formatDate(roll.unloadedAt)}</div>
            <MetaTags roll={roll}/>
          </div>
          <div className="card-actions">
            <button className="btn-cta" onClick={()=>{setSel(roll);setForm({lab:'',devPrice:''});setModal('lab');}}>🧪 送沖曬 →</button>
          </div>
        </div>
      ))}

      {/* MODAL: Load Film */}
      {modal==='load'&&(
        <Modal title="裝片 · Load Film" onClose={()=>setModal(null)}
          footer={<><button className="btn-modal-cancel" onClick={()=>setModal(null)}>取消</button><button className="btn-modal-ok" onClick={submitLoad}>確認裝片</button></>}>
          <div className="form-group">
            <label className="form-label">選擇菲林 FILM</label>
            <select className="form-select" value={form.filmId} onChange={e=>F('filmId',e.target.value)}>
              {avail.map(f=><option key={f.id} value={f.id}>{f.name} ({state.stock[f.id]||0} 卷){isExpired(f.expiry)?' [已過期]':''}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">選擇相機 CAMERA</label>
            <select className="form-select" value={form.cameraId} onChange={e=>{F('cameraId',e.target.value);F('cameraNew','');}}>
              <option value="">— 選擇已有相機 —</option>
              {freeCams.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">或新增相機 <span className="form-opt">OPT</span></label>
            <input className="form-input" value={form.cameraNew} onChange={e=>{F('cameraNew',e.target.value);F('cameraId','');}} placeholder="e.g. Leica M6、Nikon FM2" autoComplete="off"/>
          </div>
          <div className="form-section-label">拍攝標記 · Shoot Tags — 全部可選</div>
          <div className="form-group">
            <label className="form-label">主題 THEME <span className="form-opt">OPT</span></label>
            <input className="form-input" value={form.theme} onChange={e=>F('theme',e.target.value)} placeholder="e.g. 生日派對、街拍" autoComplete="off"/>
          </div>
          <div className="form-group">
            <label className="form-label">地點 LOCATION <span className="form-opt">OPT</span></label>
            <input className="form-input" value={form.location} onChange={e=>F('location',e.target.value)} placeholder="e.g. 檳城、西環" autoComplete="off"/>
          </div>
          <div className="form-group">
            <label className="form-label">在場人士 PEOPLE <span className="form-opt">OPT</span></label>
            <input className="form-input" value={form.friends} onChange={e=>F('friends',e.target.value)} placeholder="e.g. John、Mary" autoComplete="off"/>
          </div>
        </Modal>
      )}

      {/* MODAL: Note */}
      {modal==='note'&&sel&&(
        <Modal title="拍攝備註" onClose={()=>setModal(null)}
          footer={<><button className="btn-modal-cancel" onClick={()=>setModal(null)}>取消</button><button className="btn-modal-ok" onClick={submitNote}>儲存</button></>}>
          <div style={{marginBottom:12,padding:'10px 14px',background:'var(--g3)',borderRadius:'var(--r)'}}>
            <div style={{fontFamily:'var(--mono)',fontSize:'0.6rem',color:'var(--g6)'}}>{sel.cameraName} · {sel.filmName}</div>
          </div>
          <div className="form-group">
            <label className="form-label">備註 NOTES</label>
            <textarea className="form-textarea" value={form.notes} onChange={e=>F('notes',e.target.value)} placeholder="e.g. 4月檳城行程、試用新鏡頭..."/>
          </div>
        </Modal>
      )}

      {/* MODAL: Send to Lab — now with devPrice (required) */}
      {modal==='lab'&&sel&&(
        <Modal title="送沖曬 · Send to Lab" onClose={()=>setModal(null)}
          footer={<><button className="btn-modal-cancel" onClick={()=>setModal(null)}>取消</button><button className="btn-modal-ok" onClick={submitLab}>確認送出</button></>}>
          <div style={{marginBottom:16,padding:'10px 14px',background:'var(--g3)',borderRadius:'var(--r)'}}>
            <div style={{fontFamily:'var(--body)',fontWeight:700,marginBottom:3,color:'#EEE'}}>{sel.filmName}</div>
            <div style={{fontFamily:'var(--mono)',fontSize:'0.6rem',color:'var(--g6)'}}>{sel.cameraName}{sel.notes&&` · 「${sel.notes}」`}</div>
          </div>
          <div className="form-group">
            <label className="form-label">沖曬店 LAB NAME</label>
            <input className="form-input" value={form.lab} onChange={e=>F('lab',e.target.value)} placeholder="e.g. Lab88、AgX Lab、自行沖曬" autoComplete="off"/>
          </div>
          <div className="form-group">
            <label className="form-label">沖曬費用 DEV PRICE</label>
            <div className="price-wrap">
              <span className="price-prefix">$</span>
              <input className="form-input price-input" type="number" value={form.devPrice} onChange={e=>F('devPrice',e.target.value)} placeholder="0.00" min="0" step="0.01"/>
            </div>
          </div>
        </Modal>
      )}

      {/* MODAL: Camera Management */}
      {modal==='cameras'&&(
        <Modal title="管理相機" onClose={()=>setModal(null)} single
          footer={<button className="btn-modal-cancel" onClick={()=>setModal(null)}>關閉</button>}>
          {state.cameras.length===0
            ?<div style={{textAlign:'center',padding:'24px 0',fontFamily:'var(--mono)',fontSize:'0.6rem',color:'var(--g5)',letterSpacing:2}}>尚未新增相機紀錄</div>
            :state.cameras.map(cam=>{
              const active=state.rolls.find(r=>r.cameraId===cam.id&&r.status==='loaded');
              return (
                <div key={cam.id} className="cam-manage-row">
                  <div style={{flex:1}}>
                    <div className="cam-manage-name">{cam.name}</div>
                    <div className="cam-manage-sub">{active?`裝片中：${active.filmName}`:'空置'}</div>
                  </div>
                  <button className="btn-danger" onClick={()=>deleteCamera(cam.id)}>刪除</button>
                </div>
              );
            })
          }
          <div style={{padding:'12px 0 4px'}}>
            <div style={{fontFamily:'var(--mono)',fontSize:'0.55rem',color:'var(--g5)',letterSpacing:2,textTransform:'uppercase'}}>＊服役中的相機無法刪除，請先退片</div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ③ LAB TAB (沖曬)
// ══════════════════════════════════════════
function LabTab({state,dispatch,toast}) {
  const [modal,setModal]=useState(null);
  const [sel,setSel]=useState(null);
  const [form,setForm]=useState({});
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));

  const developing=useMemo(()=>state.rolls.filter(r=>r.status==='developing'),[state.rolls]);
  const archived  =useMemo(()=>[...state.rolls.filter(r=>r.status==='archived')].sort((a,b)=>(b.archivedAt||'').localeCompare(a.archivedAt||'')),[state.rolls]);

  function openArchive(roll){setSel(roll);setForm({downloadUrl:roll.downloadUrl||'',folderName:genFolderName(roll)});setModal('archive');}
  function submitArchive(){
    const folder=form.folderName||genFolderName(sel);
    dispatch({type:'UPDATE_ROLL',id:sel.id,updates:{status:'archived',archivedAt:nowISO(),downloadUrl:form.downloadUrl,folderName:folder}});
    dispatch({type:'LOG',entry:{id:uid(),type:'archive',date:today(),timestamp:nowISO(),title:`歸檔：${sel.filmName}`,detail:folder}});
    toast(`✓ 已歸檔：${folder}`);setModal(null);
  }
  function togglePosted(roll){
    const next=!roll.posted;
    dispatch({type:'UPDATE_ROLL',id:roll.id,updates:{posted:next}});
    if(next){dispatch({type:'LOG',entry:{id:uid(),type:'post',date:today(),timestamp:nowISO(),title:`已發佈：${roll.filmName}`,detail:roll.folderName||''}});toast('✓ 標記為已發佈');}
  }
  async function copyText(t){try{await navigator.clipboard.writeText(t);toast('✓ 已複製');}catch(e){toast('請手動選取複製');}}

  function MetaLine({roll}){
    const p=[roll.theme,roll.location,roll.friends].filter(Boolean);
    if(!p.length)return null;
    return <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:5}}>{p.map((x,i)=><span key={i} className="meta-tag">{x}</span>)}</div>;
  }

  return (
    <div style={{paddingBottom:8}}>
      <div className="sec-head"><span className="sec-title">🧪 沖曬中</span><span className="sec-count">{developing.length}</span></div>
      {developing.length===0&&<div className="empty" style={{padding:'24px 20px'}}><span style={{fontSize:'1.5rem',display:'block',marginBottom:8,opacity:0.25}}>🧪</span>目前無底片正在沖曬</div>}
      {developing.map(roll=>(
        <div key={roll.id} className="card" style={{borderLeft:'3px solid var(--c-dev)'}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3,flexWrap:'wrap'}}>
              <div className="card-title">{roll.filmName}</div>
              <span className="pill developing">沖曬中</span>
              {roll.devPrice>0&&<span style={{fontFamily:'var(--mono)',fontSize:'0.58rem',color:'var(--k-yellow)',marginLeft:'auto'}}>沖曬費 ${roll.devPrice}</span>}
            </div>
            <div className="card-sub">{roll.cameraName} · {roll.lab}{roll.sentAt&&` · ${formatDate(roll.sentAt)}`}</div>
            {roll.notes&&<div className="notes-display">「{roll.notes}」</div>}
            <MetaLine roll={roll}/>
          </div>
          <div className="card-actions">
            <button className="btn-cta" onClick={()=>openArchive(roll)}>📥 收到底片 →</button>
          </div>
        </div>
      ))}

      <div className="divider"/>
      <div className="sec-head"><span className="sec-title">📁 已歸檔</span><span className="sec-count">{archived.length}</span></div>
      {archived.length===0&&<div className="empty" style={{padding:'24px 20px'}}><span style={{fontSize:'1.5rem',display:'block',marginBottom:8,opacity:0.25}}>📁</span>尚無歸檔紀錄</div>}
      {archived.map(roll=>(
        <div key={roll.id} className="card" style={{borderLeft:`3px solid ${roll.posted?'var(--g5)':'var(--c-arch)'}`,opacity:roll.posted?0.65:1}}>
          <div style={{marginBottom:10}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,flexWrap:'wrap'}}>
              <div className="card-title">{roll.filmName}</div>
              {roll.posted?<span className="pill posted">已發佈</span>:<span className="pill archived">已歸檔</span>}
            </div>
            <div className="card-sub">{roll.cameraName} · {formatDate(roll.archivedAt)}</div>
            <MetaLine roll={roll}/>
          </div>
          {roll.folderName&&(
            <div className="folder-box"><div className="folder-text">📂 {roll.folderName}</div><button className="folder-copy-btn" onClick={()=>copyText(roll.folderName)}>COPY</button></div>
          )}
          <div className="toggle-row">
            <label className="toggle"><input type="checkbox" checked={roll.posted} onChange={()=>togglePosted(roll)}/><div className="toggle-track"/></label>
            <span className="toggle-label">{roll.posted?'已發佈 ✓':'待發佈'}</span>
          </div>
        </div>
      ))}

      {modal==='archive'&&sel&&(
        <Modal title="歸檔 · Archive" onClose={()=>setModal(null)}
          footer={<><button className="btn-modal-cancel" onClick={()=>setModal(null)}>取消</button><button className="btn-modal-ok" onClick={submitArchive}>確認歸檔</button></>}>
          <div style={{marginBottom:16,padding:'10px 14px',background:'var(--g3)',borderRadius:'var(--r)'}}>
            <div style={{fontFamily:'var(--body)',fontWeight:700,marginBottom:3,color:'#EEE'}}>{sel.filmName}</div>
            <div style={{fontFamily:'var(--mono)',fontSize:'0.6rem',color:'var(--g6)'}}>{sel.cameraName}{sel.lab&&` · ${sel.lab}`}</div>
            {[sel.theme,sel.location,sel.friends].filter(Boolean).length>0&&(
              <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:6}}>{[sel.theme&&`🎭 ${sel.theme}`,sel.location&&`📍 ${sel.location}`,sel.friends&&`👥 ${sel.friends}`].filter(Boolean).map((p,i)=><span key={i} className="meta-tag">{p}</span>)}</div>
            )}
          </div>
          <div className="form-group">
            <label className="form-label">自動命名 AUTO NAME</label>
            <div className="folder-box" style={{marginBottom:8}}><div className="folder-text">{form.folderName}</div><button className="folder-copy-btn" onClick={()=>copyText(form.folderName)}>COPY</button></div>
            <label className="form-label" style={{marginTop:8}}>自訂命名 <span className="form-opt">OPT</span></label>
            <input className="form-input" value={form.folderName} onChange={e=>F('folderName',e.target.value)}/>
          </div>
          <div className="form-group">
            <label className="form-label">下載連結 DOWNLOAD LINK <span className="form-opt">OPT</span></label>
            <input className="form-input" type="url" value={form.downloadUrl} onChange={e=>F('downloadUrl',e.target.value)} placeholder="https://..."/>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ④ LOG TAB — Annual Trend Chart + Dashboard + Calendar
// Uses Recharts via CDN (window.Recharts)
// ══════════════════════════════════════════
const TYPE_META={
  stock:   {ch:'入庫'},
  load:    {ch:'裝片'},
  note:    {ch:'備註'},
  unload:  {ch:'退片'},
  lab:     {ch:'送沖'},
  archive: {ch:'歸檔'},
  post:    {ch:'發佈'},
};

// Custom tooltip for recharts
function ChartTooltip({active,payload,label}) {
  if(!active||!payload?.length) return null;
  return (
    <div className="chart-tooltip">
      <div style={{fontFamily:'var(--display)',fontWeight:800,color:'var(--k-yellow)',marginBottom:5}}>{label}月</div>
      {payload.map((p,i)=>(
        <div key={i} style={{display:'flex',justifyContent:'space-between',gap:12,color:p.color,lineHeight:1.7}}>
          <span>{p.name}</span>
          <span style={{fontWeight:700}}>{p.dataKey==='spend'?'$'+Number(p.value).toFixed(0):p.value}</span>
        </div>
      ))}
    </div>
  );
}

function AnnualChart({log, year}) {
  // Build 12-month data from log
  const data = useMemo(()=>{
    const months=Array.from({length:12},(_,i)=>({month:i+1,qty:0,spend:0}));
    log.forEach(ev=>{
      const d=ev.date||'';
      if(!d.startsWith(String(year))) return;
      const m=parseInt(d.slice(5,7))-1;
      if(m<0||m>11) return;
      if(ev.type==='stock') {
        months[m].qty+=(ev.qty||0);
        months[m].spend+=(ev.price||0);
      }
      if(ev.type==='lab') {
        months[m].spend+=(ev.devPrice||0);
      }
    });
    return months.map(m=>({...m, label:`${m.month}`}));
  },[log,year]);

  // Recharts via CDN — window.Recharts
  if(typeof window.Recharts==='undefined') {
    return <div style={{textAlign:'center',padding:'20px',fontFamily:'var(--mono)',fontSize:'0.6rem',color:'var(--g5)',letterSpacing:2}}>圖表載入中...</div>;
  }
  const {ResponsiveContainer,ComposedChart,Bar,Line,XAxis,YAxis,CartesianGrid,Tooltip,Cell}=window.Recharts;

  return (
    <ResponsiveContainer width="100%" height={160}>
      <ComposedChart data={data} margin={{top:4,right:16,left:0,bottom:0}}>
        <CartesianGrid strokeDasharray="2 4" stroke="rgba(255,255,255,0.06)" vertical={false}/>
        <XAxis dataKey="label" tick={{fontFamily:'var(--mono)',fontSize:9,fill:'#555',letterSpacing:1}} axisLine={false} tickLine={false}/>
        <YAxis yAxisId="qty" orientation="left"  hide={true}/>
        <YAxis yAxisId="spend" orientation="right" hide={true}/>
        <Tooltip content={<ChartTooltip/>}/>
        <Bar yAxisId="qty" dataKey="qty" name="購入卷數" radius={[2,2,0,0]} maxBarSize={18}>
          {data.map((entry,i)=>(
            <Cell key={i} fill={entry.qty>0?'#FFD100':'rgba(255,209,0,0.15)'}/>
          ))}
        </Bar>
        <Line yAxisId="spend" dataKey="spend" name="月度消費" type="monotone"
          stroke="#9DCEFF" strokeWidth={2} dot={{fill:'#9DCEFF',r:3,strokeWidth:0}}
          activeDot={{r:5,fill:'#fff'}}/>
      </ComposedChart>
    </ResponsiveContainer>
  );
}

function LogTab({state}) {
  const now=new Date();
  const [calYear, setCalYear] =useState(now.getFullYear());
  const [calMonth,setCalMonth]=useState(now.getMonth());
  const [selDate, setSelDate] =useState(null);
  const todayStr=now.toISOString().slice(0,10);

  const eventMap=useMemo(()=>{
    const m={};
    state.log.forEach(ev=>{if(!m[ev.date])m[ev.date]=[];m[ev.date].push(ev);});
    return m;
  },[state.log]);

  function prevMonth(){if(calMonth===0){setCalYear(y=>y-1);setCalMonth(11);}else setCalMonth(m=>m-1);setSelDate(null);}
  function nextMonth(){if(calMonth===11){setCalYear(y=>y+1);setCalMonth(0);}else setCalMonth(m=>m+1);setSelDate(null);}

  const yyyymm=`${calYear}-${String(calMonth+1).padStart(2,'0')}`;
  const monthLabel=new Date(calYear,calMonth,1).toLocaleDateString('zh-HK',{year:'numeric',month:'long'});

  // ── Monthly expenditure ──
  const monthSpend=useMemo(()=>{
    let total=0;
    Object.entries(eventMap).forEach(([date,evs])=>{
      if(!date.startsWith(yyyymm))return;
      evs.forEach(ev=>{
        if(ev.type==='stock') total+=(ev.price||0);
        if(ev.type==='lab')   total+=(ev.devPrice||0);
      });
    });
    return total;
  },[eventMap,yyyymm]);

  // Breakdown
  const monthFilmSpend=useMemo(()=>{
    let t=0;
    Object.entries(eventMap).forEach(([d,evs])=>{if(d.startsWith(yyyymm))evs.forEach(ev=>{if(ev.type==='stock')t+=(ev.price||0);});});
    return t;
  },[eventMap,yyyymm]);
  const monthDevSpend=useMemo(()=>{
    let t=0;
    Object.entries(eventMap).forEach(([d,evs])=>{if(d.startsWith(yyyymm))evs.forEach(ev=>{if(ev.type==='lab')t+=(ev.devPrice||0);});});
    return t;
  },[eventMap,yyyymm]);

  // ── Top 5 ──
  const top5=useMemo(()=>{
    const counts={};
    Object.entries(eventMap).forEach(([date,evs])=>{
      if(!date.startsWith(yyyymm))return;
      evs.filter(e=>e.type==='load').forEach(e=>{
        const match=e.title.match(/裝片：(.+?)→|入機：(.+?)→/);
        const name=match?(match[1]||match[2]).trim():e.title.replace(/裝片：|入機：/,'').trim();
        counts[name]=(counts[name]||0)+1;
      });
    });
    return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  },[eventMap,yyyymm]);
  const maxCount=top5[0]?.[1]||1;

  // Calendar cells
  const cells=useMemo(()=>{
    const fd=new Date(calYear,calMonth,1).getDay();
    const dm=new Date(calYear,calMonth+1,0).getDate();
    const pd=new Date(calYear,calMonth,0).getDate();
    const res=[];
    for(let i=fd-1;i>=0;i--)res.push({day:pd-i,type:'prev',dateStr:null});
    for(let d=1;d<=dm;d++){
      const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      res.push({day:d,type:'cur',dateStr:ds});
    }
    const rem=res.length%7;if(rem>0)for(let d=1;d<=7-rem;d++)res.push({day:d,type:'next',dateStr:null});
    return res;
  },[calYear,calMonth]);

  // Selected day events (stock + load only, horizontal)
  const selEvents=selDate
    ?(eventMap[selDate]||[]).filter(e=>e.type==='stock'||e.type==='load').sort((a,b)=>a.timestamp.localeCompare(b.timestamp))
    :[];

  const rankCls=i=>i===0?'gold':i===1?'silver':i===2?'bronze':'';
  const barCls =i=>i===0?'':i===1?'silver':i===2?'bronze':'rest';

  return (
    <div className="log-wrap">

      {/* ── Annual Trend Chart ── */}
      <div className="chart-block">
        <div className="chart-header">
          <span className="chart-title">全年消費趨勢 ANNUAL TREND</span>
          <span className="chart-year">{calYear}</span>
        </div>
        <div className="chart-legend">
          <div className="legend-item"><div className="legend-bar"/><span>購入卷數</span></div>
          <div className="legend-item"><div className="legend-line"/><span>月度消費</span></div>
        </div>
        <AnnualChart log={state.log} year={calYear}/>
      </div>

      {/* ── Dashboard metrics ── */}
      <div className="dashboard">
        <div className="dash-card">
          <div className="dash-card-label">💰 本月總消費</div>
          <div className="dash-card-value">{fmtPrice(monthSpend)}</div>
          <div className="dash-card-sub">
            菲林 {fmtPrice(monthFilmSpend)} · 沖曬 {fmtPrice(monthDevSpend)}
          </div>
        </div>
        <div className="dash-card" style={{borderLeft:'1px solid var(--g3)'}}>
          <div className="dash-card-label">📷 本月裝片</div>
          <div className="dash-card-value">{top5.reduce((s,[,c])=>s+c,0)}</div>
          <div className="dash-card-sub">{monthLabel.replace(/年/,'年 ')}</div>
        </div>
      </div>

      {/* ── Top 5 films this month ── */}
      <div className="top5-block">
        <div className="top5-header">
          <span className="top5-title">本月最常用菲林 TOP 5</span>
          <span className="top5-title-month">{monthLabel}</span>
        </div>
        {top5.length===0
          ?<div className="top5-empty">本月暫無裝片紀錄</div>
          :<div className="top5-list">
            {top5.map(([name,count],i)=>(
              <div key={name} className="top5-row">
                <span className={`top5-rank ${rankCls(i)}`}>#{i+1}</span>
                <span className="top5-film-name">{name}</span>
                <div className="top5-bar-wrap"><div className={`top5-bar ${barCls(i)}`} style={{width:`${Math.round((count/maxCount)*100)}%`}}/></div>
                <span className="top5-count">{count}</span>
              </div>
            ))}
          </div>
        }
      </div>

      {/* ── Calendar nav ── */}
      <div className="cal-nav">
        <button className="cal-nav-btn" onClick={prevMonth}>‹</button>
        <div className="cal-month-label">{monthLabel}</div>
        <button className="cal-nav-btn" onClick={nextMonth}>›</button>
      </div>

      {/* DOW headers */}
      <div className="cal-grid">
        {['日','一','二','三','四','五','六'].map(d=><div key={d} className="cal-dow">{d}</div>)}
      </div>

      {/* Calendar cells */}
      <div className="cal-grid">
        {cells.map((cell,i)=>{
          if(cell.type!=='cur') return <div key={`p${i}`} className="cal-cell other-month"><div className="cal-date">{cell.day}</div></div>;
          const evs=eventMap[cell.dateStr]||[];
          const dotTypes=[...new Set(evs.map(e=>e.type))].slice(0,4);
          const isSel=cell.dateStr===selDate, isToday=cell.dateStr===todayStr;
          return (
            <div key={cell.dateStr} className={`cal-cell ${isToday?'today':''} ${isSel?'selected':''} ${evs.length?'has-event':''}`}
              onClick={()=>evs.length&&setSelDate(isSel?null:cell.dateStr)}>
              <div className="cal-date">{cell.day}</div>
              {dotTypes.length>0&&<div className="cal-dots">{dotTypes.map(t=><div key={t} className={`cal-dot ${t}`}/>)}</div>}
            </div>
          );
        })}
      </div>

      {/* ── Day detail: ONLY shown when a date is selected (spec #4) ── */}
      {selDate ? (
        <div className="day-panel">
          <div className="day-panel-header">
            <div className="day-panel-date">{formatDate(selDate)}</div>
            <div className="day-panel-count">{selEvents.length} 筆（入庫＋裝片）</div>
          </div>
          {selEvents.length===0
            ?<div style={{padding:'16px',fontFamily:'var(--mono)',fontSize:'0.58rem',color:'var(--g5)',letterSpacing:2,textTransform:'uppercase'}}>當日無入庫或裝片紀錄</div>
            :<div className="day-events-scroll">
              {selEvents.map(ev=>(
                <div key={ev.id} className="day-event-card">
                  <div className={`day-event-type ${ev.type}`}>[{TYPE_META[ev.type]?.ch||ev.type}]</div>
                  <div className="day-event-main">{ev.title.replace(/^入庫：|^入機：|^裝片：/,'')}</div>
                  {ev.detail&&<div className="day-event-sub">{ev.detail}</div>}
                  {ev.price>0&&<div className="day-event-sub" style={{color:'var(--k-yellow)'}}>購入 {fmtPrice(ev.price)}</div>}
                  <div className="day-event-time">{formatTS(ev.timestamp)}</div>
                </div>
              ))}
            </div>
          }
        </div>
      ) : (
        /* ── Hint when no date selected (timeline hidden per spec #4) ── */
        <div className="cal-hint">
          ↑ 點選日期查看當日紀錄
        </div>
      )}

    </div>
  );
}

// ══════════════════════════════════════════
// REDUCER — updated to carry price/devPrice in log entries
// ══════════════════════════════════════════
function reducer(state,action) {
  let s={...state};
  switch(action.type) {
    case 'BIND_BARCODE':
      s.barcodeDB={...state.barcodeDB,[action.code]:action.name}; break;
    case 'ADD_FILM_AND_STOCK':
      s.films=[...state.films,action.film];
      s.stock={...state.stock,[action.film.id]:action.qty};
      s.log=[...state.log,{id:uid(),type:'stock',date:today(),timestamp:nowISO(),
        title:`入庫：${action.qty} 卷 ${action.film.name}`,
        detail:`購入價格 ${fmtPrice(action.price)}`,
        price:action.price||0, qty:action.qty}]; break;
    case 'ADD_STOCK': {
      const prev=state.stock[action.filmId]||0;
      s.stock={...state.stock,[action.filmId]:prev+action.qty};
      s.log=[...state.log,{id:uid(),type:'stock',date:today(),timestamp:nowISO(),
        title:`入庫：${action.qty} 卷 ${action.notes}`,
        detail:`庫存 +${action.qty} → ${prev+action.qty} · 購入價格 ${fmtPrice(action.price)}`,
        price:action.price||0, qty:action.qty}]; break;
    }
    case 'ADJUST_STOCK': {
      const c=state.stock[action.filmId]||0;
      s.stock={...state.stock,[action.filmId]:Math.max(0,c+action.delta)}; break;
    }
    case 'ADD_CAMERA':  s.cameras=[...state.cameras,action.camera]; break;
    case 'DELETE_CAMERA': s.cameras=state.cameras.filter(c=>c.id!==action.camId); break;
    case 'LOAD_FILM': {
      const c=state.stock[action.filmId]||0;
      s.stock={...state.stock,[action.filmId]:Math.max(0,c-1)};
      s.rolls=[...state.rolls,action.roll];
      const r=action.roll, meta=[r.theme,r.location,r.friends].filter(Boolean).join('、');
      s.log=[...state.log,{id:uid(),type:'load',date:today(),timestamp:nowISO(),
        title:`裝片：${r.filmName} → ${r.cameraName}`,detail:meta||'庫存 -1'}]; break;
    }
    case 'UPDATE_ROLL': s.rolls=state.rolls.map(r=>r.id===action.id?{...r,...action.updates}:r); break;
    case 'LOG':         s.log=[...state.log,action.entry]; break;
    default: break;
  }
  saveDB(s); return s;
}

// ══════════════════════════════════════════
// APP ROOT
// ══════════════════════════════════════════
const TABS=[
  {id:'stock', icon:'🧊', label:'庫存'},
  {id:'shoot', icon:'📷', label:'拍攝'},
  {id:'lab',   icon:'🧪', label:'沖曬'},
  {id:'log',   icon:'🗓', label:'日誌'},
];

function App() {
  const [state,dispatch]=React.useReducer(reducer,null,loadDB);
  const [tab,setTab]=useState('stock');
  const {msg,vis,show}=useToast();

  const totalRolls =useMemo(()=>Object.values(state.stock).reduce((s,v)=>s+v,0),[state.stock]);
  const loadedCount=useMemo(()=>state.rolls.filter(r=>r.status==='loaded').length,[state.rolls]);

  return (
    <div className="app">
      <header className="topbar">
        <div>
          <div className="topbar-name">FilmVault</div>
          <div className="topbar-sub">菲林庫 · Film Inventory</div>
        </div>
        <div className="topbar-stats">
          <div className="topbar-stat">
            <span className="topbar-stat-num">{totalRolls}</span>
            <span className="topbar-stat-label">庫存</span>
          </div>
          <div className="topbar-stat">
            <span className="topbar-stat-num">{loadedCount}</span>
            <span className="topbar-stat-label">服役中</span>
          </div>
        </div>
      </header>

      <div className="view-container">
        {tab==='stock'&&<StockTab state={state} dispatch={dispatch} toast={show}/>}
        {tab==='shoot'&&<ShootTab state={state} dispatch={dispatch} toast={show}/>}
        {tab==='lab'  &&<LabTab   state={state} dispatch={dispatch} toast={show}/>}
        {tab==='log'  &&<LogTab   state={state}/>}
      </div>

      <nav className="bottom-nav">
        {TABS.map(t=>(
          <button key={t.id} className={`nav-item ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>
            <span className="nav-icon">{t.icon}</span>
            <span className="nav-label">{t.label}</span>
          </button>
        ))}
      </nav>

      <div className="toast-wrap">
        <div className={`toast ${vis?'show':''}`}>{msg}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
